<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      @custom-variant has-open (*:where(:has(:is([open], :popover-open, :open))) &);

    </style>
  </head>
  <body class="antialiased">
<div class="grid h-[31.25rem] place-content-center bg-white">
  <button command="show-modal" commandfor="dialog" class="rounded-md bg-gray-950/5 px-2.5 py-1.5 text-sm font-semibold text-gray-900 transition-all duration-300 hover:bg-gray-950/10 has-open:opacity-0">Open dialog</button>
  <el-dialog>
    <dialog id="dialog" aria-labelledby="dialog-title" class="fixed inset-0 w-auto h-auto max-h-none max-w-none overflow-y-auto bg-transparent [&::backdrop]:bg-transparent">
      <el-dialog-backdrop class="fixed inset-0 bg-gray-500/75 transition-opacity data-[closed]:opacity-0 data-[enter]:duration-300 data-[enter]:ease-in data-[leave]:duration-200 data-[leave]:ease-in"></el-dialog-backdrop>

      <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
        <el-dialog-panel class="relative overflow-hidden rounded-lg bg-white px-4 pt-5 pb-4 text-left shadow-xl transition-all data-[closed]:translate-y-4 data-[closed]:opacity-0 data-[enter]:duration-300 data-[enter]:ease-in data-[leave]:duration-200 data-[leave]:ease-in sm:my-8 sm:w-full sm:max-w-lg sm:p-6 sm:data-[closed]:translate-y-0 sm:data-[closed]:scale-95">
          <div class="sm:flex sm:items-start">
            <div class="mx-auto flex w-12 h-12 shrink-0 items-center justify-center rounded-full bg-red-100 sm:mx-0 sm:w-10 sm:h-10">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="w-6 h-6 text-red-600">
                <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
              <h3 id="dialog-title" class="text-base/6 font-semibold text-gray-900">Deactivate account</h3>
              <div class="mt-2">
                <p class="text-sm text-gray-500">Are you sure you want to deactivate your account? All of your data will be permanently removed from our servers forever. This action cannot be undone.</p>
              </div>
            </div>
          </div>
          <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
            <button type="button" command="close" commandfor="dialog" class="inline-flex w-full justify-center rounded-md bg-red-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-red-500 sm:ml-3 sm:w-auto">Deactivate</button>
            <button type="button" command="close" commandfor="dialog" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring-1 inset-ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">Cancel</button>
          </div>
        </el-dialog-panel>
      </div>
    </dialog>
  </el-dialog>
</div>
<script>
  {
    function onReady() {
      for (let elDialog of document.querySelectorAll('el-dialog')) {
        let dialog = elDialog.querySelector('dialog')

        // Mark dialog as inert to prevent focus from moving inside
        dialog.inert = true

        dialog.addEventListener(
          'beforetoggle',
          (evt) => {
            if (evt.newState !== 'open') return

            // Fire normal events for initial value on focus if any
            for (let element of dialog.querySelectorAll('[data-initial-value-on-focus]')) {
              let value = element.getAttribute('data-initial-value-on-focus')
              element.removeAttribute('data-initial-value-on-focus')
              element.value = value
              element.dispatchEvent(new Event('input'))
            }

            // Then, after all events have been processed, allow focusing
            setTimeout(() => {
              dialog.inert = false
            }, 0)
          },
          { once: true },
        )

        // Now we can open the dialog
        elDialog.open = true
      }
    }
    if (customElements.get('el-dialog')) {
      onReady()
    } else {
      window.addEventListener('elements:ready', onReady)
    }
  }
</script>

  </body>
</html>
