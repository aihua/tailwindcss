<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
  <style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="flex items-center justify-center bg-gray-900 p-8 dark">
    <div class="mx-auto w-full max-w-80">
      <div>
        <label for="price" class="block text-sm font-medium text-white">Price</label>
        <div class="mt-2">
          <div class="flex items-center rounded-lg bg-white/5 px-3 outline outline-solid -outline-offset-1 outline-white/10 focus-within:outline-2 focus-within:outline-solid focus-within:-outline-offset-2 focus-within:outline-violet-400">
            <div class="shrink-0 text-base text-zinc-400 select-none sm:text-sm">$</div>
            <input id="price" type="text" name="price" placeholder="0.00" aria-describedby="price-currency" class="block min-w-0 grow bg-transparent py-1.5 pr-3 pl-1 text-base text-white placeholder-gray-500 focus:outline-none sm:text-sm" />
            <div id="price-currency" class="shrink-0 text-base text-zinc-400 select-none sm:text-sm">USD</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script></script>
</body>
</html>
