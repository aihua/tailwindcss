<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      --color-panel: oklab(27.8% -0.00750866 -0.0321344 / 0.5);
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="flex justify-center bg-gray-900 px-8 py-12 dark">
    <fieldset aria-label="Choose a memory option">
      <div class="flex items-center justify-between">
        <div class="text-sm/6 font-medium text-white">RAM</div>
        <a href="#" class="text-sm/6 font-medium text-violet-400 hover:text-violet-300">See performance specs</a>
      </div>
      <div class="mt-2 grid grid-cols-3 gap-3 sm:grid-cols-6">
        <label aria-label="4 GB" class="group relative flex items-center justify-center rounded-md border border-white/10 bg-panel p-3 has-[:checked]:border-violet-500 has-[:checked]:bg-violet-500 has-[:checked]:border-violet-600 has-[:checked]:bg-violet-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-violet-500 has-[:disabled]:border-white/10 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)] has-[:disabled]:opacity-25">
          <input type="radio" name="option" value="4gb" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
          <span class="text-sm/5 font-medium uppercase text-white">4 GB</span>
        </label>
        <label aria-label="8 GB" class="group relative flex items-center justify-center rounded-md border border-white/10 bg-panel p-3 has-[:checked]:border-violet-500 has-[:checked]:bg-violet-500 has-[:checked]:border-violet-600 has-[:checked]:bg-violet-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-violet-500 has-[:disabled]:border-white/10 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)] has-[:disabled]:opacity-25">
          <input type="radio" name="option" value="8gb" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
          <span class="text-sm/5 font-medium uppercase text-white">8 GB</span>
        </label>
        <label aria-label="16 GB" class="group relative flex items-center justify-center rounded-md border border-white/10 bg-panel p-3 has-[:checked]:border-violet-500 has-[:checked]:bg-violet-500 has-[:checked]:border-violet-600 has-[:checked]:bg-violet-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-violet-500 has-[:disabled]:border-white/10 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)] has-[:disabled]:opacity-25">
          <input type="radio" name="option" value="16gb" checked class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
          <span class="text-sm/5 font-medium uppercase text-white">16 GB</span>
        </label>
        <label aria-label="32 GB" class="group relative flex items-center justify-center rounded-md border border-white/10 bg-panel p-3 has-[:checked]:border-violet-500 has-[:checked]:bg-violet-500 has-[:checked]:border-violet-600 has-[:checked]:bg-violet-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-violet-500 has-[:disabled]:border-white/10 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)] has-[:disabled]:opacity-25">
          <input type="radio" name="option" value="32gb" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
          <span class="text-sm/5 font-medium uppercase text-white">32 GB</span>
        </label>
        <label aria-label="64 GB" class="group relative flex items-center justify-center rounded-md border border-white/10 bg-panel p-3 has-[:checked]:border-violet-500 has-[:checked]:bg-violet-500 has-[:checked]:border-violet-600 has-[:checked]:bg-violet-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-violet-500 has-[:disabled]:border-white/10 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)] has-[:disabled]:opacity-25">
          <input type="radio" name="option" value="64gb" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
          <span class="text-sm/5 font-medium uppercase text-white">64 GB</span>
        </label>
        <label aria-label="128 GB" class="group relative flex items-center justify-center rounded-md border border-white/10 bg-panel p-3 has-[:checked]:border-violet-500 has-[:checked]:bg-violet-500 has-[:checked]:border-violet-600 has-[:checked]:bg-violet-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-violet-500 has-[:disabled]:border-white/10 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)] has-[:disabled]:opacity-25">
          <input type="radio" name="option" value="128gb" disabled class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
          <span class="text-sm/5 font-medium uppercase text-white">128 GB</span>
        </label>
      </div>
    </fieldset>
  </div>
</body>
</html>
