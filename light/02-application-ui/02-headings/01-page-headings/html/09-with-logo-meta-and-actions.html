<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div class="bg-white py-8">
  <div class="mx-auto max-w-7xl">
    <div class="px-4 py-10 sm:px-6 lg:px-8">
      <div class="mx-auto flex items-center justify-between gap-x-8 wzx">
        <div class="flex items-center gap-x-6">
          <img src="https://tailwindcss.com/plus-assets/img/logos/48x48/tuple.svg" alt="" class="w-[4.0rem] h-[4.0rem] flex-none rounded-full outline-1 outline-gray-900/10" />
          <h1>
            <div class="text-sm/6 text-gray-500">Invoice <span class="text-gray-700">#00011</span></div>
            <div class="mt-1 text-base/6 font-semibold text-gray-900">Tuple, Inc</div>
          </h1>
        </div>
        <div class="flex items-center gap-x-4 sm:gap-x-6">
          <button type="button" class="hidden text-sm/6 font-semibold text-gray-900 sm:block">Copy URL</button>
          <a href="#" class="hidden text-sm/6 font-semibold text-gray-900 sm:block">Edit</a>
          <a href="#" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Send</a>

          <el-dropdown class="relative sm:hidden">
            <button class="relative block">
              <span class="absolute -inset-3"></span>
              <span class="sr-only whitespace-nowrap w-px h-px absolute overflow-hidden">More</span>
              <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5 text-gray-500">
                <path d="M10 3a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM10 8.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM11.5 15.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0Z" />
              </svg>
            </button>

            <el-menu anchor="bottom end" popover class="w-[8.0rem] origin-top-right rounded-md bg-white py-2 shadow-lg outline-1 outline-gray-900/5 transition transition-discrete wzc wzm wzn wzo wzp wzq wzr wzs">
              <button type="button" class="block w-full px-3 py-1 text-left text-sm/6 text-gray-900 focus:bg-gray-50 wzh">Copy URL</button>
              <a href="#" class="block px-3 py-1 text-sm/6 text-gray-900 focus:bg-gray-50 wzh">Edit</a>
            </el-menu>
          </el-dropdown>
        </div>
      </div>
    </div>
  </div>
</div>

  </body>
</html>
