<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="flex min-h-[700px]">
      <div class="flex w-full items-center justify-center bg-white px-4 sm:px-6 lg:px-8">
        <div class="w-72">
          <div>
            <div class="group relative flex flex-col-reverse">
              <div class="mt-4 flex items-center justify-between space-x-8 text-base font-medium text-gray-900">
                <h3>
                  <a href="#">Women&#039;s Basic Tee</a>
                </h3>
                <p>$32</p>
              </div>
              <div class="relative">
                <img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-quick-preview-01-preview.jpg" alt="Front of women's Basic Tee in black." class="aspect-[4/3] w-full rounded-lg bg-gray-100 object-cover" />
                <div class="absolute inset-0 flex items-end p-4">
                  <button type="button" command="show-modal" commandfor="dialog-1" class="relative z-10 w-full rounded-md bg-white/75 px-4 py-2 text-sm text-gray-900 opacity-0 group-hover:opacity-100 focus:opacity-100">Quick View<span class="sr-only">, Women&#039;s Basic Tee</span></button>
                </div>
              </div>
            </div>

            <el-dialog>
              <dialog id="dialog-1" class="relative z-10 [&::backdrop]:bg-transparent">
                <el-dialog-backdrop class="fixed inset-0 hidden bg-gray-500/75 transition-opacity data-[closed]:opacity-0 data-enter:duration-300 data-enter:ease-[cubic-bezier(0,0,0.2,1)] data-leave:duration-200 data-leave:ease-[cubic-bezier(0.4,0,1,1)] md:block"></el-dialog-backdrop>

                <div tabindex="0" class="fixed inset-0 z-10 w-screen overflow-y-auto focus:outline-none">
                  <div class="flex min-h-full items-stretch justify-center text-center md:items-center md:px-2 lg:px-4">
                    <!-- This element is to trick the browser into centering the modal contents. -->
                    <span aria-hidden="true" class="hidden md:inline-block md:h-screen md:align-middle">&#8203;</span>
                    <!-- Modal panel, show/hide based on modal state. -->
                    <el-dialog-panel class="flex w-full [transform:var(--tw-rotate-x,)_var(--tw-rotate-y,)_var(--tw-rotate-z,)_var(--tw-skew-x,)_var(--tw-skew-y,)] text-left text-base transition data-[closed]:translate-y-4 data-[closed]:opacity-0 data-enter:duration-300 data-enter:ease-[cubic-bezier(0,0,0.2,1)] data-leave:duration-200 data-leave:ease-[cubic-bezier(0.4,0,1,1)] md:my-8 md:max-w-2xl md:px-4 md:data-[closed]:translate-y-0 md:data-[closed]:scale-95 lg:max-w-4xl">
                      <div class="relative flex w-full items-center overflow-hidden bg-white px-4 pt-14 pb-8 shadow-xl sm:px-6 sm:pt-8 md:p-6 lg:p-8">
                        <button type="button" command="close" commandfor="dialog-1" class="absolute top-4 right-4 text-gray-400 hover:text-gray-500 sm:top-8 sm:right-6 lg:top-8 lg:right-8">
                          <span class="sr-only">Close</span>
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="h-6 w-6">
                            <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                          </svg>
                        </button>

                        <div class="grid w-full grid-cols-1 items-start gap-x-6 gap-y-8 sm:grid-cols-12 lg:items-center lg:gap-x-8">
                          <img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-page-01-featured-product-shot.jpg" alt="Back of women&#039;s Basic Tee in black." class="aspect-[2/3] w-full rounded-lg bg-gray-100 object-cover sm:col-span-4 lg:col-span-5" />
                          <div class="sm:col-span-8 lg:col-span-7">
                            <h2 class="text-xl font-medium text-gray-900 sm:pr-12">Women&#039;s Basic Tee</h2>

                            <section aria-labelledby="information-heading" class="mt-1">
                              <h3 id="information-heading" class="sr-only">Product information</h3>

                              <p class="font-medium text-gray-900">$32</p>

                              <!-- Reviews -->
                              <div class="mt-4">
                                <h4 class="sr-only">Reviews</h4>
                                <div class="flex items-center">
                                  <p class="text-sm text-gray-700">
                                    3.9
                                    <span class="sr-only"> out of 5 stars</span>
                                  </p>
                                  <div class="ml-1 flex items-center">
                                    <!-- Active: "text-yellow-400", Default: "text-gray-200" -->
                                    <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="h-5 w-5 shrink-0 text-yellow-400">
                                      <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />
                                    </svg>
                                    <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="h-5 w-5 shrink-0 text-yellow-400">
                                      <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />
                                    </svg>
                                    <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="h-5 w-5 shrink-0 text-yellow-400">
                                      <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />
                                    </svg>
                                    <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="h-5 w-5 shrink-0 text-yellow-400">
                                      <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />
                                    </svg>
                                    <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="h-5 w-5 shrink-0 text-gray-200">
                                      <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />
                                    </svg>
                                  </div>
                                  <div class="ml-4 hidden lg:flex lg:items-center">
                                    <span aria-hidden="true" class="text-gray-300">&middot;</span>
                                    <a href="#" class="ml-4 text-sm font-medium text-indigo-600 hover:text-indigo-500">See all 512 reviews</a>
                                  </div>
                                </div>
                              </div>
                            </section>

                            <section aria-labelledby="options-heading" class="mt-8">
                              <h3 id="options-heading" class="sr-only">Product options</h3>

                              <form>
                                <!-- Color picker -->
                                <fieldset aria-label="Choose a color">
                                  <legend class="text-sm font-medium text-gray-900">Color</legend>

                                  <div class="mt-2 flex items-center gap-x-3">
                                    <div class="flex rounded-full outline-1 -outline-offset-1 outline-[oklab(0%_none_none/.1)]">
                                      <input type="radio" name="color" value="black" checked aria-label="Black" class="h-8 w-8 appearance-none rounded-full bg-gray-900 forced-color-adjust-none checked:outline-2 checked:outline-offset-2 checked:outline-gray-900 focus-visible:outline-3 focus-visible:outline-offset-3" />
                                    </div>
                                    <div class="flex rounded-full outline-1 -outline-offset-1 outline-[oklab(0%_none_none/.1)]">
                                      <input type="radio" name="color" value="heather-grey" aria-label="Heather Grey" class="h-8 w-8 appearance-none rounded-full bg-gray-400 forced-color-adjust-none checked:outline-2 checked:outline-offset-2 checked:outline-gray-400 focus-visible:outline-3 focus-visible:outline-offset-3" />
                                    </div>
                                  </div>
                                </fieldset>

                                <!-- Size picker -->
                                <fieldset aria-label="Choose a size" class="mt-8">
                                  <div class="flex items-center justify-between">
                                    <div class="text-sm font-medium text-gray-900">Size</div>
                                    <a href="#" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Size guide</a>
                                  </div>
                                  <div class="mt-2 grid grid-cols-4 gap-3">
                                    <label aria-label="XXS" class="group relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25">
                                      <input type="radio" name="size" value="xxs" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
                                      <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">XXS</span>
                                    </label>
                                    <label aria-label="XS" class="group relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25">
                                      <input type="radio" name="size" value="xs" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
                                      <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">XS</span>
                                    </label>
                                    <label aria-label="S" class="group relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25">
                                      <input type="radio" name="size" value="s" checked class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
                                      <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">S</span>
                                    </label>
                                    <label aria-label="M" class="group relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25">
                                      <input type="radio" name="size" value="m" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
                                      <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">M</span>
                                    </label>
                                    <label aria-label="L" class="group relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25">
                                      <input type="radio" name="size" value="l" class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
                                      <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">L</span>
                                    </label>
                                    <label aria-label="XL" class="group relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25">
                                      <input type="radio" name="size" value="xl" disabled class="absolute inset-0 appearance-none focus:outline-none disabled:cursor-not-allowed" />
                                      <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">XL</span>
                                    </label>
                                  </div>
                                </fieldset>

                                <button type="submit" class="mt-8 flex w-full items-center justify-center rounded-md border border-transparent bg-indigo-600 px-8 py-3 text-base font-medium text-white hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:outline-none">Add to bag</button>

                                <p class="absolute top-4 left-4 text-center sm:static sm:mt-8">
                                  <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">View full details</a>
                                </p>
                              </form>
                            </section>
                          </div>
                        </div>
                      </div>
                    </el-dialog-panel>
                  </div>
                </div>
              </dialog>
            </el-dialog>
          </div>
        </div>
      </div>
    </div>
    <script>
      {
        function onReady() {
          for (let elDialog of document.querySelectorAll('el-dialog')) {
            let dialog = elDialog.querySelector('dialog')

            // Mark dialog as inert to prevent focus from moving inside
            dialog.inert = true

            dialog.addEventListener(
              'beforetoggle',
              (evt) => {
                if (evt.newState !== 'open') return

                // Fire normal events for initial value on focus if any
                for (let element of dialog.querySelectorAll('[data-initial-value-on-focus]')) {
                  let value = element.getAttribute('data-initial-value-on-focus')
                  element.removeAttribute('data-initial-value-on-focus')
                  element.value = value
                  element.dispatchEvent(new Event('input'))
                }

                // Then, after all events have been processed, allow focusing
                setTimeout(() => {
                  dialog.inert = false
                }, 0)
              },
              { once: true },
            )

            // Now we can open the dialog
            elDialog.open = true
          }
        }
        if (customElements.get('el-dialog')) {
          onReady()
        } else {
          window.addEventListener('elements:ready', onReady)
        }
      }
    </script>
  </body>
</html>
