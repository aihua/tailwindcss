<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex items-center justify-center bg-gray-900 p-8 [color-scheme:dark]">
      <div class="flex flex-wrap justify-center gap-x-6 gap-y-4">
        <span class="inline-flex items-center rounded-md bg-gray-400/10 px-1.5 py-0.5 text-xs font-medium text-gray-300">Badge</span>
        <span class="inline-flex items-center rounded-md bg-red-400/10 px-1.5 py-0.5 text-xs font-medium text-red-400">Badge</span>
        <span class="inline-flex items-center rounded-md bg-yellow-400/10 px-1.5 py-0.5 text-xs font-medium text-yellow-500">Badge</span>
        <span class="inline-flex items-center rounded-md bg-green-400/10 px-1.5 py-0.5 text-xs font-medium text-green-400">Badge</span>
        <span class="inline-flex items-center rounded-md bg-blue-400/10 px-1.5 py-0.5 text-xs font-medium text-blue-400">Badge</span>
        <span class="inline-flex items-center rounded-md bg-indigo-400/10 px-1.5 py-0.5 text-xs font-medium text-indigo-400">Badge</span>
        <span class="inline-flex items-center rounded-md bg-purple-400/10 px-1.5 py-0.5 text-xs font-medium text-purple-400">Badge</span>
        <span class="inline-flex items-center rounded-md bg-pink-400/10 px-1.5 py-0.5 text-xs font-medium text-pink-400">Badge</span>
      </div>
    </div>
  </body>
</html>
