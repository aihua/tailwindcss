<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="bg-gray-900 [color-scheme:dark]">
    <div class="mx-auto max-w-320 px-4 py-12 sm:px-6 lg:px-8">
      <div class="border-b border-white/10 pb-5 sm:pb-0">
        <h3 class="text-base font-semibold text-white">Candidates</h3>
        <div class="mt-3 sm:mt-4">
          <!-- Mobile select dropdown -->
          <div class="grid grid-cols-1 sm:hidden">
            <!-- Use an "onChange" listener to redirect the user to the selected tab URL. -->
            <select
              aria-label="Select a tab"
              class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-white/5 py-2 pr-8 pl-3 text-base text-white outline outline-offset-[-1px] outline-white/10 [&>*]:bg-gray-800 focus:outline-2 focus:outline-offset-[-2px] focus:outline-white">
              <option>Applied</option>
              <option>Phone Screening</option>
              <option selected>Interview</option>
              <option>Offer</option>
              <option>Hired</option>
            </select>
            <svg
              viewBox="0 0 16 16"
              fill="currentColor"
              data-slot="icon"
              aria-hidden="true"
              class="pointer-events-none col-start-1 row-start-1 mr-2 size-5 self-center justify-self-end fill-gray-400">
              <path
                d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"
                clip-rule="evenodd"
                fill-rule="evenodd" />
            </svg>
          </div>
          <!-- Tabs at small breakpoint and up -->
          <div class="hidden sm:block">
            <nav class="-mb-px flex space-x-8">
              <!-- Current: "border-indigo-400 text-indigo-400", Default: "border-transparent text-gray-400 hover:border-white/20 hover:text-white" -->
              <a href="#" class="border-b-2 border-transparent px-1 pb-4 text-sm font-medium whitespace-nowrap text-gray-400 hover:border-white/20 hover:text-white">Applied</a>
              <a href="#" class="border-b-2 border-transparent px-1 pb-4 text-sm font-medium whitespace-nowrap text-gray-400 hover:border-white/20 hover:text-white">Phone Screening</a>
              <a href="#" aria-current="page" class="border-b-2 border-indigo-400 px-1 pb-4 text-sm font-medium whitespace-nowrap text-indigo-400">Interview</a>
              <a href="#" class="border-b-2 border-transparent px-1 pb-4 text-sm font-medium whitespace-nowrap text-gray-400 hover:border-white/20 hover:text-white">Offer</a>
              <a href="#" class="border-b-2 border-transparent px-1 pb-4 text-sm font-medium whitespace-nowrap text-gray-400 hover:border-white/20 hover:text-white">Hired</a>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
