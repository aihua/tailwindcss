<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div class="bg-gray-200 py-8">
  <div class="mx-auto max-w-[72.0rem] px-4 sm:px-6 lg:px-8">
    <div class="overflow-hidden rounded-lg bg-white shadow-sm">
      <h2 id="profile-overview-title" class="sr-only whitespace-nowrap w-px h-px absolute overflow-hidden">Profile Overview</h2>
      <div class="bg-white p-6">
        <div class="sm:flex sm:items-center sm:justify-between">
          <div class="sm:flex space-x-5 sm:space-x-5">
            <div class="shrink-0">
              <img src="https://images.unsplash.com/photo-1550525811-e5869dd03032?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="" class="mx-auto w-[5.0rem] h-[5.0rem] rounded-full" />
            </div>
            <div class="mt-4 text-center sm:mt-0 sm:pt-1 sm:text-left">
              <p class="text-sm font-medium text-gray-600">Welcome back,</p>
              <p class="text-xl/7 font-bold text-gray-900 sm:text-2xl/8">Rebecca Nicholas</p>
              <p class="text-sm font-medium text-gray-600">Product Designer</p>
            </div>
          </div>
          <div class="mt-5 flex justify-center sm:mt-0">
            <a href="#" class="flex items-center justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring-1 inset-ring-gray-300 hover:bg-gray-50">View profile</a>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 divide-y divide-gray-200 border-t border-gray-200 bg-gray-50 sm:grid-cols-3 divide-x sm:divide-x divide-y-0 sm:divide-y-0">
        <div class="px-6 py-5 text-center text-sm font-medium">
          <span class="text-gray-900">12</span>
          <span class="text-gray-600">Vacation days left</span>
        </div>
        <div class="px-6 py-5 text-center text-sm font-medium">
          <span class="text-gray-900">4</span>
          <span class="text-gray-600">Sick days left</span>
        </div>
        <div class="px-6 py-5 text-center text-sm font-medium">
          <span class="text-gray-900">2</span>
          <span class="text-gray-600">Personal days left</span>
        </div>
      </div>
    </div>
  </div>
</div>

  </body>
</html>
