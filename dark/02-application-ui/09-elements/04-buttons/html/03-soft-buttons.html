<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="bg-gray-900 px-4 py-8 [color-scheme:dark]">
      <div class="mx-auto flex max-w-3xl flex-col items-center justify-start space-y-4 sm:flex-row sm:items-end sm:justify-around sm:space-y-0">
        <button type="button" class="rounded bg-indigo-500/20 px-2 py-1 text-xs font-semibold text-indigo-400 hover:bg-indigo-500/30">Button text</button>
        <button type="button" class="rounded bg-indigo-500/20 px-2 py-1 text-sm font-semibold text-indigo-400 hover:bg-indigo-500/30">Button text</button>
        <button type="button" class="rounded-md bg-indigo-500/20 px-2.5 py-1.5 text-sm font-semibold text-indigo-400 hover:bg-indigo-500/30">Button text</button>
        <button type="button" class="rounded-md bg-indigo-500/20 px-3 py-2 text-sm font-semibold text-indigo-400 hover:bg-indigo-500/30">Button text</button>
        <button type="button" class="rounded-md bg-indigo-500/20 px-3.5 py-2.5 text-sm font-semibold text-indigo-400 hover:bg-indigo-500/30">Button text</button>
      </div>
    </div>
  </body>
</html>
