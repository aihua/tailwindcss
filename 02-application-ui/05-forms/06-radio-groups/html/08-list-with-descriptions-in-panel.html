<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      --color-panel: oklab(27.8% -0.00750866 -0.0321344 / 0.5);
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="flex justify-center bg-gray-900 px-8 py-12 dark">
    <div class="mx-auto w-full max-w-3xl">
      <fieldset aria-label="Privacy setting" class="-space-y-px rounded-md bg-panel">
        <label
          aria-label="Public access"
          aria-description="This project would be available to anyone who has the link"
          class="group flex border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none forced:focus:outline-2 forced:focus:outline-offset-2 forced:focus:outline-transparent has-[:checked]:relative has-[:checked]:border-violet-700 has-[:checked]:bg-violet-500/10">
          <input
            type="radio"
            name="privacy-setting"
            value="public"
            checked
            class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden" />
          <span class="ml-3 flex flex-col">
            <span class="block text-sm/5 font-medium text-white group-has-[:checked]:text-violet-400">Public access</span>
            <span class="block text-sm/5 text-gray-400 group-has-[:checked]:text-violet-400/75">This project would be available to anyone who has the link</span>
          </span>
        </label>
        <label
          aria-label="Private to project members"
          aria-description="Only members of this project would be able to access"
          class="group flex border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none forced:focus:outline-2 forced:focus:outline-offset-2 forced:focus:outline-transparent has-[:checked]:relative has-[:checked]:border-violet-700 has-[:checked]:bg-violet-500/10">
          <input
            type="radio"
            name="privacy-setting"
            value="private-to-project-members"
            class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden" />
          <span class="ml-3 flex flex-col">
            <span class="block text-sm/5 font-medium text-white group-has-[:checked]:text-violet-400">Private to project members</span>
            <span class="block text-sm/5 text-gray-400 group-has-[:checked]:text-violet-400/75">Only members of this project would be able to access</span>
          </span>
        </label>
        <label
          aria-label="Private to you"
          aria-description="You are the only one able to access this project"
          class="group flex border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none forced:focus:outline-2 forced:focus:outline-offset-2 forced:focus:outline-transparent has-[:checked]:relative has-[:checked]:border-violet-700 has-[:checked]:bg-violet-500/10">
          <input
            type="radio"
            name="privacy-setting"
            value="private-to-you"
            class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden" />
          <span class="ml-3 flex flex-col">
            <span class="block text-sm/5 font-medium text-white group-has-[:checked]:text-violet-400">Private to you</span>
            <span class="block text-sm/5 text-gray-400 group-has-[:checked]:text-violet-400/75">You are the only one able to access this project</span>
          </span>
        </label>
      </fieldset>
    </div>
  </div>
</body>
</html>
