<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="bg-white">
      <div class="mx-auto max-w-7xl">
        <div class="grid grid-cols-1 gap-px bg-gray-900/5 sm:grid-cols-2 lg:grid-cols-4">
          <div class="bg-white px-4 py-6 sm:px-6 lg:px-8">
            <p class="text-sm/6 font-medium text-gray-500">Number of deploys</p>
            <p class="mt-2 flex items-baseline gap-x-2">
              <span class="text-4xl font-semibold tracking-tight text-gray-900">405</span>
            </p>
          </div>
          <div class="bg-white px-4 py-6 sm:px-6 lg:px-8">
            <p class="text-sm/6 font-medium text-gray-500">Average deploy time</p>
            <p class="mt-2 flex items-baseline gap-x-2">
              <span class="text-4xl font-semibold tracking-tight text-gray-900">3.65</span>
              <span class="text-sm text-gray-500">mins</span>
            </p>
          </div>
          <div class="bg-white px-4 py-6 sm:px-6 lg:px-8">
            <p class="text-sm/6 font-medium text-gray-500">Number of servers</p>
            <p class="mt-2 flex items-baseline gap-x-2">
              <span class="text-4xl font-semibold tracking-tight text-gray-900">3</span>
            </p>
          </div>
          <div class="bg-white px-4 py-6 sm:px-6 lg:px-8">
            <p class="text-sm/6 font-medium text-gray-500">Success rate</p>
            <p class="mt-2 flex items-baseline gap-x-2">
              <span class="text-4xl font-semibold tracking-tight text-gray-900">98.5%</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
