<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-white">
  <div class="mx-auto max-w-[42rem] px-4 py-16 sm:px-6 sm:py-24 lg:max-w-[80rem] lg:px-8">
    <div class="flex items-center justify-between">
      <h2 class="text-2xl font-bold tracking-tight text-gray-900">Trending products</h2>
      <a href="#" class="hidden text-sm font-medium text-violet-600 hover:text-violet-500 md:block">
        Shop the collection
        <span aria-hidden="true"> →</span>
      </a>
    </div>

    <div class="mt-6 grid grid-cols-2 gap-4 sm:gap-6 md:grid-cols-4 md:gap-0 lg:gap-8">
      <div class="group relative">
        <div class="h-56 w-full overflow-hidden rounded-sm bg-gray-100 group-hover:opacity-75 lg:h-72 xl:h-80">
          <img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/home-page-04-trending-product-02.jpg" alt="Hand stitched, orange leather long wallet." class="h-full w-full object-cover" />
        </div>
        <h3 class="mt-4 text-sm text-gray-700">
          <a href="#">
            <span class="absolute inset-0"></span>
            Leather Long Wallet
          </a>
        </h3>
        <p class="mt-1 text-sm text-gray-500">Natural</p>
        <p class="mt-1 text-sm font-medium text-gray-900">$75</p>
      </div>

      <div class="group relative">
        <div class="h-56 w-full overflow-hidden rounded-sm bg-gray-100 group-hover:opacity-75 lg:h-72 xl:h-80">
          <img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/home-page-04-trending-product-03.jpg" alt="12-sided, machined black pencil and pen." class="h-full w-full object-cover" />
        </div>
        <h3 class="mt-4 text-sm text-gray-700">
          <a href="#">
            <span class="absolute inset-0"></span>
            Machined Pencil and Pen Set
          </a>
        </h3>
        <p class="mt-1 text-sm text-gray-500">Black</p>
        <p class="mt-1 text-sm font-medium text-gray-900">$70</p>
      </div>

      <div class="group relative">
        <div class="h-56 w-full overflow-hidden rounded-sm bg-gray-100 group-hover:opacity-75 lg:h-72 xl:h-80">
          <img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/home-page-04-trending-product-04.jpg" alt="Set of three light and dark brown mini sketch books." class="h-full w-full object-cover" />
        </div>
        <h3 class="mt-4 text-sm text-gray-700">
          <a href="#">
            <span class="absolute inset-0"></span>
            Mini-Sketchbooks
          </a>
        </h3>
        <p class="mt-1 text-sm text-gray-500">Light Brown</p>
        <p class="mt-1 text-sm font-medium text-gray-900">$27</p>
      </div>

      <div class="group relative">
        <div class="h-56 w-full overflow-hidden rounded-sm bg-gray-100 group-hover:opacity-75 lg:h-72 xl:h-80">
          <img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/home-page-04-trending-product-01.jpg" alt="Beautiful walnut organizer set with multiple white compartments" class="h-full w-full object-cover" />
        </div>
        <h3 class="mt-4 text-sm text-gray-700">
          <a href="#">
            <span class="absolute inset-0"></span>
            Organizer Set
          </a>
        </h3>
        <p class="mt-1 text-sm text-gray-500">Walnut</p>
        <p class="mt-1 text-sm font-medium text-gray-900">$149</p>
      </div>
    </div>

    <div class="mt-8 text-sm md:hidden">
      <a href="#" class="font-medium text-violet-600 hover:text-violet-500">
        Shop the collection
        <span aria-hidden="true"> →</span>
      </a>
    </div>
  </div>
</body>
</html>
