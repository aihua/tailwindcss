  <body class="antialiased">

    <div class="flex w-full flex-col items-center space-y-4 sm:items-end">

          <div class="flex items-start">
            <div class="shrink-[0]">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="w-6 h-6 text-gray-400">
                <path d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div class="ml-3 w-0 flex-1 pt-0.5">
              <p class="text-sm font-medium text-gray-900">Discussion moved</p>
              <p class="mt-1 text-sm text-gray-500">Lorem ipsum dolor sit amet consectetur adipisicing elit oluptatum tenetur.</p>
              <div class="mt-3 flex space-x-7">
                <button type="button" class="rounded-[.375rem] text-sm font-medium text-indigo-600 hover:text-indigo-500 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-500">Undo</button>
                <button type="button" class="rounded-[.375rem] text-sm font-medium text-gray-700 hover:text-gray-500 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-500">Dismiss</button>

            </div>

              <button type="button" class="inline-flex rounded-[.375rem] text-gray-400 hover:text-gray-500 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-600">
                <span class="sr-only whitespace-nowrap border-0 w-[0.0625rem] h-[0.0625rem] -m-[0.0625rem] p-0 absolute overflow-hidden">Close</span>
