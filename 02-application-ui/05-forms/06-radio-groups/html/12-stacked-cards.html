<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      --color-panel: oklab(27.8% -0.00750866 -0.0321344 / 0.5);
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="flex justify-center bg-gray-900 px-8 py-12 dark">
    <div class="mx-auto w-full max-w-xl">
      <fieldset aria-label="Server size">
        <div class="space-y-4">
          <label
            aria-label="Hobby"
            aria-description="8GB, 4 CPUs, 160 GB SSD disk, $40 per month"
            class="group relative block rounded-lg border border-white/10 bg-panel px-6 py-4 has-[:checked]:outline-2 has-[:checked]:-outline-offset-2 has-[:checked]:outline-violet-500 has-[:focus-visible]:outline-3 has-[:focus-visible]:-outline-offset-1 sm:flex sm:justify-between">
            <input type="radio" name="plan" value="hobby" checked class="absolute inset-0 appearance-none focus:outline-none" />
            <span class="flex items-center">
              <span class="flex flex-col text-sm/5">
                <span class="font-medium text-white">Hobby</span>
                <span class="text-gray-400">
                  <span class="block sm:inline">8GB / 4 CPUs</span>
                  <span aria-hidden="true" class="hidden sm:inline sm:mx-1">&middot;</span>
                  <span class="block sm:inline">160 GB SSD disk</span>
                </span>
              </span>
            </span>
            <span class="mt-2 flex text-sm/5 sm:mt-0 sm:ml-4 sm:flex-col sm:text-right">
              <span class="font-medium text-white">$40</span>
              <span class="ml-1 text-gray-400 sm:ml-0">/mo</span>
            </span>
          </label>
          <label
            aria-label="Startup"
            aria-description="12GB, 6 CPUs, 256 GB SSD disk, $80 per month"
            class="group relative block rounded-lg border border-white/10 bg-panel px-6 py-4 has-[:checked]:outline-2 has-[:checked]:-outline-offset-2 has-[:checked]:outline-violet-500 has-[:focus-visible]:outline-3 has-[:focus-visible]:-outline-offset-1 sm:flex sm:justify-between">
            <input type="radio" name="plan" value="startup" class="absolute inset-0 appearance-none focus:outline-none" />
            <span class="flex items-center">
              <span class="flex flex-col text-sm/5">
                <span class="font-medium text-white">Startup</span>
                <span class="text-gray-400">
                  <span class="block sm:inline">12GB / 6 CPUs</span>
                  <span aria-hidden="true" class="hidden sm:inline sm:mx-1">&middot;</span>
                  <span class="block sm:inline">256 GB SSD disk</span>
                </span>
              </span>
            </span>
            <span class="mt-2 flex text-sm/5 sm:mt-0 sm:ml-4 sm:flex-col sm:text-right">
              <span class="font-medium text-white">$80</span>
              <span class="ml-1 text-gray-400 sm:ml-0">/mo</span>
            </span>
          </label>
          <label
            aria-label="Business"
            aria-description="16GB, 8 CPUs, 512 GB SSD disk, $160 per month"
            class="group relative block rounded-lg border border-white/10 bg-panel px-6 py-4 has-[:checked]:outline-2 has-[:checked]:-outline-offset-2 has-[:checked]:outline-violet-500 has-[:focus-visible]:outline-3 has-[:focus-visible]:-outline-offset-1 sm:flex sm:justify-between">
            <input type="radio" name="plan" value="business" class="absolute inset-0 appearance-none focus:outline-none" />
            <span class="flex items-center">
              <span class="flex flex-col text-sm/5">
                <span class="font-medium text-white">Business</span>
                <span class="text-gray-400">
                  <span class="block sm:inline">16GB / 8 CPUs</span>
                  <span aria-hidden="true" class="hidden sm:inline sm:mx-1">&middot;</span>
                  <span class="block sm:inline">512 GB SSD disk</span>
                </span>
              </span>
            </span>
            <span class="mt-2 flex text-sm/5 sm:mt-0 sm:ml-4 sm:flex-col sm:text-right">
              <span class="font-medium text-white">$160</span>
              <span class="ml-1 text-gray-400 sm:ml-0">/mo</span>
            </span>
          </label>
          <label
            aria-label="Enterprise"
            aria-description="32GB, 12 CPUs, 1024 GB SSD disk, $240 per month"
            class="group relative block rounded-lg border border-white/10 bg-panel px-6 py-4 has-[:checked]:outline-2 has-[:checked]:-outline-offset-2 has-[:checked]:outline-violet-500 has-[:focus-visible]:outline-3 has-[:focus-visible]:-outline-offset-1 sm:flex sm:justify-between">
            <input type="radio" name="plan" value="enterprise" class="absolute inset-0 appearance-none focus:outline-none" />
            <span class="flex items-center">
              <span class="flex flex-col text-sm/5">
                <span class="font-medium text-white">Enterprise</span>
                <span class="text-gray-400">
                  <span class="block sm:inline">32GB / 12 CPUs</span>
                  <span aria-hidden="true" class="hidden sm:inline sm:mx-1">&middot;</span>
                  <span class="block sm:inline">1024 GB SSD disk</span>
                </span>
              </span>
            </span>
            <span class="mt-2 flex text-sm/5 sm:mt-0 sm:ml-4 sm:flex-col sm:text-right">
              <span class="font-medium text-white">$240</span>
              <span class="ml-1 text-gray-400 sm:ml-0">/mo</span>
            </span>
          </label>
        </div>
      </fieldset>
    </div>
  </div>
</body>
</html>
