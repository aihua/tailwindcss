<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <section class="bg-gray-900 py-24 sm:py-32">
    <div class="mx-auto max-w-7xl px-6 lg:px-8">
      <div class="mx-auto grid max-w-2xl grid-cols-1 lg:mx-0 lg:max-w-none lg:grid-cols-2">
        <!-- Left testimonial -->
        <div class="flex flex-col pb-10 sm:pb-16 lg:pb-0 lg:pr-8 xl:pr-20">
          <img src="https://tailwindcss.com/plus-assets/img/logos/tuple-logo-white.svg" alt="" class="h-12 self-start lg:pt-0" />
          <figure class="mt-10 flex flex-1 flex-col justify-between">
            <blockquote class="text-lg/8 text-gray-100">
              <p>
                “Amet amet eget scelerisque tellus sit neque faucibus non eleifend. Integer eu praesent at a. Ornare
                arcu gravida natoque erat et cursus tortor consequat at. Vulputate gravida sociis enim nullam ultricies
                habitant malesuada lorem ac. Tincidunt urna dui pellentesque sagittis.”
              </p>
            </blockquote>
            <figcaption class="mt-10 flex items-center gap-x-6">
              <img
                src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                alt=""
                class="size-14 rounded-full bg-gray-800" />
              <div class="text-base">
                <div class="font-semibold text-white">Judith Black</div>
                <div class="mt-1 text-gray-400">CEO of Tuple</div>
              </div>
            </figcaption>
          </figure>
        </div>
        <!-- Right testimonial -->
        <div class="flex flex-col border-t border-white/10 pt-10 sm:pt-16 lg:border-t-0 lg:border-l lg:border-white/10 lg:pt-0 lg:pl-8 xl:pl-20">
          <img src="https://tailwindcss.com/plus-assets/img/logos/reform-logo-white.svg" alt="" class="h-12 self-start lg:pt-0" />
          <figure class="mt-10 flex flex-1 flex-col justify-between">
            <blockquote class="text-lg/8 text-gray-100">
              <p>
                “Excepteur veniam labore ullamco eiusmod. Pariatur consequat proident duis dolore nulla veniam
                reprehenderit nisi officia voluptate incididunt exercitation exercitation elit. Nostrud veniam sint
                dolor nisi ullamco.”
              </p>
            </blockquote>
            <figcaption class="mt-10 flex items-center gap-x-6">
              <img
                src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                alt=""
                class="size-14 rounded-full bg-gray-800" />
              <div class="text-base">
                <div class="font-semibold text-white">Joseph Rodriguez</div>
                <div class="mt-1 text-gray-400">CEO of Reform</div>
              </div>
            </figcaption>
          </figure>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
