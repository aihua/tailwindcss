<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="flex items-center justify-center bg-gray-900 p-8 dark">
    <div class="w-full max-w-xl">
      <div class="flex items-center justify-between">
        <span class="flex grow flex-col">
          <label id="availability-label" class="text-sm leading-6 font-medium text-white">Available to hire</label>
          <span id="availability-description" class="text-sm text-gray-400">Nulla amet tempus sit accumsan. Aliquet turpis sed sit lacinia.</span>
        </span>
        <div class="group relative inline-flex w-11 shrink-0 rounded-full bg-gray-800 p-0.5 inset-ring-1 inset-ring-white/10 outline-offset-2 outline-gray-900 transition-colors duration-200 ease-in-out has-[:checked]:bg-indigo-500 has-[:focus-visible]:outline outline-2">
          <span class="size-5 rounded-full bg-white shadow-sm ring-1 ring-gray-900/5 transition-transform duration-200 ease-in-out group-has-[:checked]:translate-x-5"></span>
          <input
            id="availability"
            type="checkbox"
            name="availability"
            aria-labelledby="availability-label"
            aria-describedby="availability-description"
            class="absolute inset-0 size-full appearance-none focus:outline-none" />
        </div>
      </div>
    </div>
  </div>
</body>
</html>
