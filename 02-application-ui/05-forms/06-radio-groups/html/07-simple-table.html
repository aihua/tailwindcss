<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex justify-center bg-gray-900 px-8 py-12 scheme-dark">
      <div class="mx-auto w-full max-w-3xl">
        <fieldset aria-label="Pricing plans" class="relative -space-y-px rounded-md bg-gray-800/50">
          <label aria-label="Startup" aria-description="$29 per month, $290 per year, Up to 5 active job postings" class="group flex flex-col border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none has-[:checked]:relative has-[:checked]:border-indigo-800 has-[:checked]:bg-indigo-600/10 lg:grid lg:grid-cols-3 lg:pr-6 lg:pl-4">
            <span class="flex items-center gap-3 text-sm">
              <input type="radio" name="pricing-plan" value="startup" checked class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus:outline-none focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
              <span class="font-medium text-white group-has-[:checked]:text-indigo-300">Startup</span>
            </span>
            <span class="ml-6 pl-1 text-sm lg:ml-0 lg:pl-0 lg:text-center">
              <span class="font-medium text-white group-has-[:checked]:text-indigo-300">$29 / mo</span>
              <span class="text-gray-400 group-has-[:checked]:text-indigo-300/75">($290 / yr)</span>
            </span>
            <span class="ml-6 pl-1 text-sm text-gray-400 group-has-[:checked]:text-indigo-300/75 lg:ml-0 lg:pl-0 lg:text-right">Up to 5 active job postings</span>
          </label>
          <label aria-label="Business" aria-description="$99 per month, $990 per year, Up to 25 active job postings" class="group flex flex-col border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none has-[:checked]:relative has-[:checked]:border-indigo-800 has-[:checked]:bg-indigo-600/10 lg:grid lg:grid-cols-3 lg:pr-6 lg:pl-4">
            <span class="flex items-center gap-3 text-sm">
              <input type="radio" name="pricing-plan" value="business" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus:outline-none focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
              <span class="font-medium text-white group-has-[:checked]:text-indigo-300">Business</span>
            </span>
            <span class="ml-6 pl-1 text-sm lg:ml-0 lg:pl-0 lg:text-center">
              <span class="font-medium text-white group-has-[:checked]:text-indigo-300">$99 / mo</span>
              <span class="text-gray-400 group-has-[:checked]:text-indigo-300/75">($990 / yr)</span>
            </span>
            <span class="ml-6 pl-1 text-sm text-gray-400 group-has-[:checked]:text-indigo-300/75 lg:ml-0 lg:pl-0 lg:text-right">Up to 25 active job postings</span>
          </label>
          <label aria-label="Enterprise" aria-description="$249 per month, $2490 per year, Unlimited active job postings" class="group flex flex-col border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none has-[:checked]:relative has-[:checked]:border-indigo-800 has-[:checked]:bg-indigo-600/10 lg:grid lg:grid-cols-3 lg:pr-6 lg:pl-4">
            <span class="flex items-center gap-3 text-sm">
              <input type="radio" name="pricing-plan" value="enterprise" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus:outline-none focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
              <span class="font-medium text-white group-has-[:checked]:text-indigo-300">Enterprise</span>
            </span>
            <span class="ml-6 pl-1 text-sm lg:ml-0 lg:pl-0 lg:text-center">
              <span class="font-medium text-white group-has-[:checked]:text-indigo-300">$249 / mo</span>
              <span class="text-gray-400 group-has-[:checked]:text-indigo-300/75">($2490 / yr)</span>
            </span>
            <span class="ml-6 pl-1 text-sm text-gray-400 group-has-[:checked]:text-indigo-300/75 lg:ml-0 lg:pl-0 lg:text-right">Unlimited active job postings</span>
          </label>
        </fieldset>
      </div>
    </div>
  </body>
</html>
