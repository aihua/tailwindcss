<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';

<body class="antialiased bg-gray-900">
  <div class="bg-gray-900 [color-scheme:dark]">
    <div class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
      <div class="border-b border-white/10">
        <div class="sm:flex sm:items-baseline">
          <h3 class="text-base font-semibold text-white">Issues</h3>
          <div class="mt-4 sm:mt-0 sm:ml-10">
            <nav class="-mb-px flex space-x-8">
              <!-- Current: "border-indigo-400 text-indigo-400", Default: "border-transparent text-gray-400 hover:border-white/20 hover:text-white" -->
              <a href="#" aria-current="page" class="border-b-2 border-indigo-400 px-1 pb-4 text-sm font-medium whitespace-nowrap text-indigo-400">Open</a>
              <a href="#" class="border-b-2 border-transparent px-1 pb-4 text-sm font-medium whitespace-nowrap text-gray-400 hover:border-white/20 hover:text-white">Closed</a>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>

</html>
