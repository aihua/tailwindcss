<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="flex justify-center bg-gray-900 px-8 py-12 dark">
    <fieldset>
      <legend class="text-sm font-semibold text-white">Notifications</legend>
      <p class="mt-1 text-sm text-zinc-400">How do you prefer to receive notifications?</p>
      <div class="mt-6 space-y-6">
        <div class="flex items-center">
          <input
            id="email"
            type="radio"
            name="notification-method"
            checked
            class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden"
          />
          <label for="email" class="ml-3 block text-sm font-medium text-white">Email</label>
        </div>
        <div class="flex items-center">
          <input
            id="sms"
            type="radio"
            name="notification-method"
            class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden"
          />
          <label for="sms" class="ml-3 block text-sm font-medium text-white">Phone (SMS)</label>
        </div>
        <div class="flex items-center">
          <input
            id="push"
            type="radio"
            name="notification-method"
            class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden"
          />
          <label for="push" class="ml-3 block text-sm font-medium text-white">Push notification</label>
        </div>
      </div>
    </fieldset>
  </div>
</body>
</html>
