<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
  <div class="bg-gray-900 scheme-dark px-4 py-6 sm:px-6 sm:py-12 lg:px-8">
    <div class="mx-auto max-w-3xl">
      <div>
        <div class="grid grid-cols-1 sm:hidden">
          <!-- Use an "onChange" listener to redirect the user to the selected tab URL. -->
          <select aria-label="Select a tab" class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-white/5 py-2 pr-8 pl-3 text-base text-gray-100 outline-1 -outline-offset-1 outline-white/10 [&>*]:bg-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500">
            <option>My Account</option>
            <option>Company</option>
            <option selected>Team Members</option>
            <option>Billing</option>
          </select>
          <svg viewBox="0 0 16 16" fill="currentColor" data-slot="icon" aria-hidden="true" class="pointer-events-none col-start-1 row-start-1 mr-2 h-5 w-5 self-center justify-self-end fill-gray-400">
            <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
          </svg>
        </div>
        <div class="hidden sm:block">
          <nav aria-label="Tabs" class="isolate flex divide-x divide-white/10 rounded-lg bg-gray-50 shadow-sm outline-1 -outline-offset-1 outline-white/10 dark:bg-gray-800/50 dark:shadow-none">
            <!-- Current: "text-white", Default: "text-gray-400 hover:text-white" -->
            <a href="#" class="group relative min-w-0 flex-1 overflow-hidden rounded-l-lg px-4 py-4 text-center text-sm font-medium text-gray-400 hover:bg-white/5 hover:text-white focus:z-10">
              <span>My Account</span>
              <span aria-hidden="true" class="absolute inset-x-0 bottom-0 h-0.5 bg-transparent"></span>
            </a>
            <a href="#" class="group relative min-w-0 flex-1 overflow-hidden px-4 py-4 text-center text-sm font-medium text-gray-400 hover:bg-white/5 hover:text-white focus:z-10">
              <span>Company</span>
              <span aria-hidden="true" class="absolute inset-x-0 bottom-0 h-0.5 bg-transparent"></span>
            </a>
            <a href="#" aria-current="page" class="group relative min-w-0 flex-1 overflow-hidden px-4 py-4 text-center text-sm font-medium text-white hover:bg-white/5 focus:z-10">
              <span>Team Members</span>
              <span aria-hidden="true" class="absolute inset-x-0 bottom-0 h-0.5 bg-indigo-400"></span>
            </a>
            <a href="#" class="group relative min-w-0 flex-1 overflow-hidden rounded-r-lg px-4 py-4 text-center text-sm font-medium text-gray-400 hover:bg-white/5 hover:text-white focus:z-10">
              <span>Billing</span>
              <span aria-hidden="true" class="absolute inset-x-0 bottom-0 h-0.5 bg-transparent"></span>
            </a>
          </nav>
        </div>
      </div>
    </div>
  </div>
  </body>
</html>
