<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
    :where(:has(:is([open], :popover-open, :open))) .hide-when-open {
      opacity: 0;
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="grid h-[31.25rem] place-content-center bg-gray-900 dark">
    <button
      command="show-modal"
      commandfor="dialog"
      class="rounded-md bg-white/10 px-2.5 py-1.5 text-sm font-semibold text-white inset-ring inset-ring-white/5 transition-all duration-300 hover:bg-white/20 hide-when-open">
      Open dialog
    </button>
    <el-dialog>
      <dialog id="dialog" aria-labelledby="dialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent">
        <el-dialog-backdrop class="fixed inset-0 bg-gray-900/50 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"></el-dialog-backdrop>

        <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0">
          <el-dialog-panel
            class="relative transform overflow-hidden rounded-lg bg-gray-800 px-4 pt-5 pb-4 text-left shadow-xl outline -outline-offset-1 outline-white/10 transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-sm sm:p-6 sm:data-closed:translate-y-0 sm:data-closed:scale-95">
            <div>
              <div class="mx-auto flex size-12 items-center justify-center rounded-full bg-emerald-500/10">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  data-slot="icon"
                  aria-hidden="true"
                  class="size-6 text-emerald-400">
                  <path d="m4.5 12.75 6 6 9-13.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </div>
              <div class="mt-3 text-center sm:mt-5">
                <h3 id="dialog-title" class="text-base font-semibold text-white">Payment successful</h3>
                <div class="mt-2">
                  <p class="text-sm text-gray-400">
                    Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequatur amet labore.
                  </p>
                </div>
              </div>
            </div>
            <div class="mt-5 sm:mt-6">
              <button
                type="button"
                command="close"
                commandfor="dialog"
                class="inline-flex w-full justify-center rounded-md bg-violet-500 px-3 py-2 text-sm font-semibold text-white hover:bg-violet-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
                Go back to dashboard
              </button>
            </div>
          </el-dialog-panel>
        </div>
      </dialog>
    </el-dialog>
  </div>
  <script>
    {
      function openDialogs() {
        for (let elDialog of document.querySelectorAll('el-dialog')) {
          let dialog = elDialog.querySelector('dialog');
          dialog.inert = true;
          dialog.addEventListener('beforetoggle', evt => {
            if (evt.newState !== 'open') return;
            for (let element of dialog.querySelectorAll('[data-initial-value-on-focus]')) {
              let value = element.getAttribute('data-initial-value-on-focus');
              element.removeAttribute('data-initial-value-on-focus');
              element.value = value;
              element.dispatchEvent(new Event('input'));
            }
            setTimeout(() => { dialog.inert = false; }, 0);
          }, {once: true});
          if (customElements.get('el-dialog')) {
            elDialog.open = true;
          } else {
            dialog.showModal();
            elDialog.setAttribute('open', '');
          }
        }
      }
      if (customElements.get('el-dialog')) { openDialogs(); }
      else { window.addEventListener('elements:ready', openDialogs); }
    }
  </script>
</body>
</html>
