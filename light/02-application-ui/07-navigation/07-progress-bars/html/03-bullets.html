<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class=" antialiased">
<div class="bg-white">
  <div class="mx-auto py-12">
    <nav aria-label="Progress" class="flex items-center justify-center">
      <p class="text-sm font-medium text-gray-900">Step 2 of 4</p>
      <ol role="list" class="ml-8 flex items-center space-x-5">
        <li>
          <!-- Completed Step -->
          <a href="#" class="block w-2.5 h-2.5 rounded-full bg-indigo-600 hover:bg-indigo-900">
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 1</span>
          </a>
        </li>
        <li>
          <!-- Current Step -->
          <a href="#" aria-current="step" class="relative flex items-center justify-center">
            <span aria-hidden="true" class="absolute flex w-5 h-5 p-px">
              <span class="w-full h-full rounded-full bg-indigo-200"></span>
            </span>
            <span aria-hidden="true" class="relative block w-2.5 h-2.5 rounded-full bg-indigo-600"></span>
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 2</span>
          </a>
        </li>
        <li>
          <!-- Upcoming Step -->
          <a href="#" class="block w-2.5 h-2.5 rounded-full bg-gray-200 hover:bg-gray-400">
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 3</span>
          </a>
        </li>
        <li>
          <!-- Upcoming Step -->
          <a href="#" class="block w-2.5 h-2.5 rounded-full bg-gray-200 hover:bg-gray-400">
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 4</span>
          </a>
        </li>
      </ol>
    </nav>
  </div>
</div>

  </body>
</html>
