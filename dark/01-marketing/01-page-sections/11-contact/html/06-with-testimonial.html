<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="relative isolate bg-gray-900 px-6 py-24 sm:py-32 lg:px-8">
    <svg aria-hidden="true" class="absolute inset-0 -z-10 h-full w-full mask-[radial-gradient(100%_100%_at_100%_0,#fff,transparent)] stroke-white/10">
      <defs>
        <pattern id="pattern" width="200" height="200" x="50%" y="-64" patternUnits="userSpaceOnUse">
          <path d="M100 200V.5M.5 .5H200" fill="none" />
        </pattern>
      </defs>
      <svg x="50%" y="-64" class="overflow-visible fill-gray-800/40">
        <path d="M-100.5 0h201v201h-201Z M699.5 0h201v201h-201Z M499.5 400h201v201h-201Z M299.5 800h201v201h-201Z" stroke-width="0" />
      </svg>
      <rect width="100%" height="100%" fill="url(#pattern)" stroke-width="0" />
    </svg>
    <div class="mx-auto max-w-xl lg:max-w-4xl">
      <h2 class="text-4xl font-semibold tracking-tight text-pretty text-white sm:text-5xl">Let’s talk about your project</h2>
      <p class="mt-2 text-lg/8 text-gray-400">We help companies and individuals build out their brand guidelines.</p>
      <div class="mt-16 flex flex-col gap-16 sm:gap-y-20 lg:flex-row">
        <form action="#" method="POST" class="lg:flex-auto">
          <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
            <div>
              <label for="first-name" class="block text-sm/6 font-semibold text-white">First name</label>
              <div class="mt-2.5">
                <input id="first-name" type="text" name="first-name" autocomplete="given-name" class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline-1 outline-offset-[-1px] outline-white/10 backdrop-blur placeholder-gray-500 focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-500" />
              </div>
            </div>
            <div>
              <label for="last-name" class="block text-sm/6 font-semibold text-white">Last name</label>
              <div class="mt-2.5">
                <input id="last-name" type="text" name="last-name" autocomplete="family-name" class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline-1 outline-offset-[-1px] outline-white/10 backdrop-blur placeholder-gray-500 focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-500" />
              </div>
            </div>
            <div>
              <label for="budget" class="block text-sm/6 font-semibold text-white">Budget</label>
              <div class="mt-2.5">
                <input id="budget" type="text" name="budget" class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline-1 outline-offset-[-1px] outline-white/10 backdrop-blur placeholder-gray-500 focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-500" />
              </div>
            </div>
            <div>
              <label for="website" class="block text-sm/6 font-semibold text-white">Website</label>
              <div class="mt-2.5">
                <input id="website" type="url" name="website" class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline-1 outline-offset-[-1px] outline-white/10 backdrop-blur placeholder-gray-500 focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-500" />
              </div>
            </div>
            <div class="sm:col-span-2">
              <label for="message" class="block text-sm/6 font-semibold text-white">Message</label>
              <div class="mt-2.5">
                <textarea id="message" name="message" rows="4" class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline-1 outline-offset-[-1px] outline-white/10 backdrop-blur placeholder-gray-500 focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-500"></textarea>
              </div>
            </div>
          </div>
          <div class="mt-10">
            <button type="submit" class="block w-full rounded-md bg-indigo-500 px-3.5 py-2.5 text-center text-sm font-semibold text-white shadow-xs hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Let's talk</button>
          </div>
          <p class="mt-4 text-sm/6 text-gray-400">By submitting this form, I agree to the <a href="#" class="font-semibold whitespace-nowrap text-indigo-400">privacy policy</a>.</p>
        </form>
        <div class="lg:mt-6 lg:w-80 lg:flex-none">
          <img src="https://tailwindcss.com/plus-assets/img/logos/workcation-logo-indigo-500.svg" alt="" class="h-12 w-auto" />
          <figure class="mt-10">
            <blockquote class="text-lg/8 font-semibold text-white">
              <p>"Lorem ipsum dolor sit amet consectetur adipisicing elit. Nemo expedita voluptas culpa sapiente alias molestiae. Numquam corrupti in laborum sed rerum et corporis."</p>
            </blockquote>
            <figcaption class="mt-10 flex gap-x-6">
              <img src="https://images.unsplash.com/photo-1550525811-e5869dd03032?ixlib=rb-=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=96&h=96&q=80" alt="" class="h-12 w-12 flex-none rounded-full bg-gray-800" />
              <div>
                <div class="text-base font-semibold text-white">Brenna Goyette</div>
                <div class="text-sm/6 text-gray-400">CEO of Workcation</div>
              </div>
            </figcaption>
          </figure>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
