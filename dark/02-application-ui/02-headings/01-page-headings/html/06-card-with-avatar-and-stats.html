<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="bg-gray-900 py-8 scheme-dark">
      <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
        <div class="overflow-hidden rounded-lg bg-gray-900 outline-1 -outline-offset-1 outline-white/10">
          <h2 id="profile-overview-title" class="sr-only">Profile Overview</h2>
          <div class="bg-gray-800/75 p-6">
            <div class="sm:flex sm:items-center sm:justify-between">
              <div class="sm:flex sm:space-x-5">
                <div class="shrink-0">
                  <img src="https://images.unsplash.com/photo-1550525811-e5869dd03032?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="" class="mx-auto h-20 w-20 rounded-full outline-1 -outline-offset-1 outline-white/10" />
                </div>
                <div class="mt-4 text-center sm:mt-0 sm:pt-1 sm:text-left">
                  <p class="text-sm font-medium text-gray-400">Welcome back,</p>
                  <p class="text-xl font-bold text-white sm:text-2xl">Rebecca Nicholas</p>
                  <p class="text-sm font-medium text-gray-400">Product Designer</p>
                </div>
              </div>
              <div class="mt-5 flex justify-center sm:mt-0 sm:flex">
                <a href="#" class="flex items-center justify-center rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white inset-ring-1 inset-ring-white/5 hover:bg-white/20">View profile</a>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 divide-y divide-white/10 border-t border-white/10 bg-gray-800/50 sm:grid-cols-3 sm:divide-x sm:divide-y-0">
            <div class="px-6 py-5 text-center text-sm font-medium">
              <span class="text-white">12</span>
              <span class="text-gray-400">Vacation days left</span>
            </div>
            <div class="px-6 py-5 text-center text-sm font-medium">
              <span class="text-white">4</span>
              <span class="text-gray-400">Sick days left</span>
            </div>
            <div class="px-6 py-5 text-center text-sm font-medium">
              <span class="text-white">2</span>
              <span class="text-gray-400">Personal days left</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
