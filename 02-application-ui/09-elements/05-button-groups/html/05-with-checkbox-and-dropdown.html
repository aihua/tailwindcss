<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>

</head>
<body class="antialiased bg-gray-900">
  <div class="flex items-center justify-center bg-gray-900 p-8 dark">
    <span class="inline-flex">
      <span class="inline-flex shrink-0 items-center rounded-l-md border border-gray-700 bg-white/10 px-2 py-2">
        <div class="cb grid grid-cols-1 size-4">
          <input
            type="checkbox"
            name="select-all"
            aria-label="Select all"
            class="col-start-1 row-start-1 appearance-none rounded border border-white/20 bg-transparent checked:border-indigo-500 checked:bg-indigo-500 indeterminate:border-indigo-500 indeterminate:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:checked:bg-white/10 forced:appearance-auto" />
          <svg viewBox="0 0 14 14" fill="none" class="pointer-events-none col-start-1 row-start-1 size-3.5 self-center justify-self-center stroke-white [.cb:has(:disabled)_&]:stroke-white/25">
            <path d="M3 8L6 11L11 3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 [.cb:has(:checked)_&]:opacity-100" />
            <path d="M3 7H11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 [.cb:has(:indeterminate)_&]:opacity-100" />
          </svg>
        </div>
      </span>
      <div class="-ml-px grid grid-cols-1">
        <select
          id="message-type"
          name="message-type"
          aria-label="Select message type"
          class="col-start-1 row-start-1 w-full appearance-none rounded-r-md bg-white/10 py-1.5 pr-8 pl-3 text-base text-white outline outline-1 -outline-offset-1 outline-gray-700 [&>*]:bg-[oklch(27.8%_0.033_256.848)] focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm">
          <option>Unread messages</option>
          <option>Sent messages</option>
          <option>All messages</option>
        </select>
        <svg
          viewBox="0 0 16 16"
          fill="currentColor"
          data-slot="icon"
          aria-hidden="true"
          class="pointer-events-none col-start-1 row-start-1 mr-2 size-5 self-center justify-self-end text-gray-400 sm:size-4">
          <path
            d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"
            fill-rule="evenodd" />
        </svg>
      </div>
    </span>
  </div>
</body>
</html>
