<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="flex items-center justify-center bg-gray-900 p-8 dark">
    <div class="mx-auto w-full max-w-xs">
      <div>
        <label for="phone-number" class="block text-sm font-medium text-white">Phone number</label>
        <div class="mt-2">
          <div class="flex rounded-lg bg-white/5 outline outline-solid -outline-offset-1 outline-white/10 has-[:focus-within]:outline-2 has-[:focus-within]:outline-solid has-[:focus-within]:-outline-offset-2 has-[:focus-within]:outline-violet-400">
            <div class="grid shrink-0 focus-within:relative">
              <select id="country" name="country" autocomplete="country" aria-label="Country" class="col-start-1 row-start-1 w-full appearance-none rounded-lg bg-transparent py-1.5 pr-7 pl-3 text-base text-zinc-400 placeholder-gray-500 focus:outline-2 focus:outline-solid focus:-outline-offset-2 focus:outline-violet-400 sm:text-sm [&>*]:bg-zinc-800">
                <option>US</option>
                <option>CA</option>
                <option>EU</option>
              </select>
              <svg viewBox="0 0 16 16" fill="currentColor" data-slot="icon" aria-hidden="true" class="pointer-events-none col-start-1 row-start-1 mr-2 w-5 h-5 self-center justify-self-end text-zinc-400 sm:w-4 sm:h-4">
                <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
              </svg>
            </div>
            <input id="phone-number" type="text" name="phone-number" placeholder="123-456-7890" class="block min-w-0 grow bg-transparent py-1.5 pr-3 pl-1 text-base text-white placeholder-gray-500 focus:outline-none sm:text-sm" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <script></script>
</body>
</html>
