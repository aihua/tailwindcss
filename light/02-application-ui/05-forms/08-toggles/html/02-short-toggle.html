<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div class="flex items-center justify-center bg-white p-8">
  <div class="group relative inline-flex h-5 w-10 shrink-0 items-center justify-center rounded-full outline-offset-2 outline-indigo-600 has-focus-visible:outline-2">
    <span class="absolute mx-auto h-4 w-9 rounded-full bg-gray-200 inset-ring-1 inset-ring-gray-900/5 transition-[color_background-color_border-color_outline-color_] duration-200 ease-in-out group-has-checked:bg-indigo-600"></span>
    <span class="absolute left-0 size-5 rounded-full border border-gray-300 bg-white shadow-xs transition-[transform_translate_scale_rotate] duration-200 ease-in-out group-has-checked:translate-x-5"></span>
    <input type="checkbox" name="setting" aria-label="Use setting" class="absolute inset-0 size-full appearance-none focus:outline-none" />
  </div>
</div>

  </body>
</html>
