<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class=" antialiased">
<div class="bg-white">
  <div class="mx-auto flex justify-center py-12">
    <nav aria-label="Progress">
      <ol role="list" class="flex items-center">
        <li class="relative pr-8 sm:pr-20">
          <!-- Completed Step -->
          <div aria-hidden="true" class="absolute inset-0 flex items-center">
            <div class="h-0.5 w-full bg-indigo-600"></div>
          </div>
          <a href="#" class="relative flex w-8 h-8 items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-900">
            <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5 text-white">
              <path d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" fill-rule="evenodd" />
            </svg>
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 1</span>
          </a>
        </li>
        <li class="relative pr-8 sm:pr-20">
          <!-- Completed Step -->
          <div aria-hidden="true" class="absolute inset-0 flex items-center">
            <div class="h-0.5 w-full bg-indigo-600"></div>
          </div>
          <a href="#" class="relative flex w-8 h-8 items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-900">
            <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5 text-white">
              <path d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" fill-rule="evenodd" />
            </svg>
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 2</span>
          </a>
        </li>
        <li class="relative pr-8 sm:pr-20">
          <!-- Current Step -->
          <div aria-hidden="true" class="absolute inset-0 flex items-center">
            <div class="h-0.5 w-full bg-gray-200"></div>
          </div>
          <a href="#" aria-current="step" class="relative flex w-8 h-8 items-center justify-center rounded-full border-2 border-indigo-600 bg-white">
            <span aria-hidden="true" class="w-2.5 h-2.5 rounded-full bg-indigo-600"></span>
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 3</span>
          </a>
        </li>
        <li class="relative pr-8 sm:pr-20">
          <!-- Upcoming Step -->
          <div aria-hidden="true" class="absolute inset-0 flex items-center">
            <div class="h-0.5 w-full bg-gray-200"></div>
          </div>
          <a href="#" class="group relative flex w-8 h-8 items-center justify-center rounded-full border-2 border-gray-300 bg-white hover:border-gray-400">
            <span aria-hidden="true" class="w-2.5 h-2.5 rounded-full mbl group-hover:bg-gray-300"></span>
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 4</span>
          </a>
        </li>
        <li class="relative">
          <!-- Upcoming Step -->
          <div aria-hidden="true" class="absolute inset-0 flex items-center">
            <div class="h-0.5 w-full bg-gray-200"></div>
          </div>
          <a href="#" class="group relative flex w-8 h-8 items-center justify-center rounded-full border-2 border-gray-300 bg-white hover:border-gray-400">
            <span aria-hidden="true" class="w-2.5 h-2.5 rounded-full mbl group-hover:bg-gray-300"></span>
            <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Step 5</span>
          </a>
        </li>
      </ol>
    </nav>
  </div>
</div>

  </body>
</html>
