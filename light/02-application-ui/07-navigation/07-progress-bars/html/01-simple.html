<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class=" antialiased">
<div class="bg-white">
  <div class="mx-auto max-w-7xl p-6">
    <nav aria-label="Progress">
      <ol role="list" class="space-y-4 md:flex space-y-0 md:space-y-0 space-x-8 md:space-x-8">
        <li class="md:flex-1">
          <!-- Completed Step -->
          <a href="#" class="group flex flex-col border-l-4 border-indigo-600 py-2 pl-4 hover:border-indigo-800 md:border-t-4 md:border-l-0 md:pt-4 md:pb-0 md:pl-0">
            <span class="text-sm font-medium text-indigo-600 group-hover:text-indigo-800">Step 1</span>
            <span class="text-sm font-medium text-gray-900">Job details</span>
          </a>
        </li>
        <li class="md:flex-1">
          <!-- Current Step -->
          <a href="#" aria-current="step" class="flex flex-col border-l-4 border-indigo-600 py-2 pl-4 md:border-t-4 md:border-l-0 md:pt-4 md:pb-0 md:pl-0">
            <span class="text-sm font-medium text-indigo-600">Step 2</span>
            <span class="text-sm font-medium text-gray-900">Application form</span>
          </a>
        </li>
        <li class="md:flex-1">
          <!-- Upcoming Step -->
          <a href="#" class="group flex flex-col border-l-4 border-gray-200 py-2 pl-4 hover:border-gray-300 md:border-t-4 md:border-l-0 md:pt-4 md:pb-0 md:pl-0">
            <span class="text-sm font-medium text-gray-500 group-hover:text-gray-700">Step 3</span>
            <span class="text-sm font-medium text-gray-900">Preview</span>
          </a>
        </li>
      </ol>
    </nav>
  </div>
</div>

  </body>
</html>
