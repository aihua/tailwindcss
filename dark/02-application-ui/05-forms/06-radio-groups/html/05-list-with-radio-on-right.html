<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex justify-center bg-gray-900 px-4 py-12 scheme-dark">
      <div class="mx-auto w-full max-w-96">
        <fieldset>
          <legend class="text-sm leading-6 font-semibold text-white">Transfer funds</legend>
          <p class="mt-1 text-sm leading-6 text-gray-400">Transfer your balance to your bank account.</p>
          <div class="mt-2.5 divide-y divide-white/10">
            <div class="relative flex items-start pt-3.5 pb-4">
              <div class="min-w-0 flex-1 text-sm leading-6">
                <label for="account-checking" class="font-medium text-white">Checking</label>
                <p id="account-checking-description" class="text-gray-400">CIBC ••••6610</p>
              </div>
              <div class="ml-3 flex h-6 items-center">
                <input id="account-checking" type="radio" name="account" checked aria-describedby="account-checking-description" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
              </div>
            </div>
            <div class="relative flex items-start pt-3.5 pb-4">
              <div class="min-w-0 flex-1 text-sm leading-6">
                <label for="account-savings" class="font-medium text-white">Savings</label>
                <p id="account-savings-description" class="text-gray-400">Bank of America ••••0149</p>
              </div>
              <div class="ml-3 flex h-6 items-center">
                <input id="account-savings" type="radio" name="account" aria-describedby="account-savings-description" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
              </div>
            </div>
            <div class="relative flex items-start pt-3.5 pb-4">
              <div class="min-w-0 flex-1 text-sm leading-6">
                <label for="account-mastercard" class="font-medium text-white">Mastercard</label>
                <p id="account-mastercard-description" class="text-gray-400">Capital One ••••7877</p>
              </div>
              <div class="ml-3 flex h-6 items-center">
                <input id="account-mastercard" type="radio" name="account" aria-describedby="account-mastercard-description" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
              </div>
            </div>
          </div>
        </fieldset>
      </div>
    </div>
  </body>
</html>
