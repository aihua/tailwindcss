<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="grid min-h-[500px] place-content-center bg-gray-900 scheme-dark">
      <button command="show-modal" commandfor="drawer" class="rounded-md bg-white/10 px-2.5 py-1.5 text-sm font-semibold text-white inset-ring-1 inset-ring-white/5 transition-all duration-300 hover:bg-white/20 [:has([open])_&]:opacity-0">Open drawer</button>
      <el-dialog>
        <dialog id="drawer" aria-labelledby="drawer-title" class="fixed inset-0 h-auto w-auto max-h-none max-w-none overflow-hidden bg-transparent [&::backdrop]:bg-transparent">
          <div tabindex="0" class="absolute inset-0 pl-10 focus:outline-none sm:pl-16">
            <el-dialog-panel class="ml-auto block h-full w-full max-w-md [transform:var(--tw-rotate-x,)_var(--tw-rotate-y,)_var(--tw-rotate-z,)_var(--tw-skew-x,)_var(--tw-skew-y,)] transition duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] data-[closed]:translate-x-full sm:duration-700">
              <div class="relative flex h-full flex-col overflow-y-auto bg-gray-800 py-6 shadow-xl after:absolute after:inset-y-0 after:left-0 after:w-px after:bg-white/10 focus:outline-none">
                <div class="px-4 sm:px-6">
                  <div class="flex items-start justify-between">
                    <h2 id="drawer-title" class="text-base font-semibold text-white">Panel title</h2>
                    <div class="ml-3 flex h-7 items-center">
                      <button type="button" command="close" commandfor="drawer" class="relative rounded-md text-gray-400 hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">
                        <span class="absolute -inset-2.5"></span>
                        <span class="sr-only">Close panel</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="h-6 w-6">
                          <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                      </button>
                    </div>
                  </div>
                </div>
                <div class="relative mt-6 flex-1 px-4 sm:px-6">
                  <x-placeholder>
                    <div class="absolute inset-0 px-4 sm:px-6">
                      <div class="relative h-full overflow-hidden rounded-xl border border-dashed border-white/20 opacity-75">
                        <svg fill="none" class="absolute inset-0 h-full w-full stroke-white/10">
                          <defs>
                            <pattern id="pattern-431c35a6-d6ff-4ec0-a97f-8a526737d5ad" width="10" height="10" x="0" y="0" patternUnits="userSpaceOnUse">
                              <path d="M-3 13 15-5M-5 5l18-18M-1 21 17 3" />
                            </pattern>
                          </defs>
                          <rect width="100%" height="100%" fill="url(#pattern-431c35a6-d6ff-4ec0-a97f-8a526737d5ad)" stroke="none" />
                        </svg>
                      </div>
                    </div>
                  </x-placeholder>
                </div>
              </div>
            </el-dialog-panel>
          </div>
        </dialog>
      </el-dialog>
    </div>
    <script>
      {
        function onReady() {
          for (let elDialog of document.querySelectorAll('el-dialog')) {
            let dialog = elDialog.querySelector('dialog')

            // Mark dialog as inert to prevent focus from moving inside
            dialog.inert = true

            dialog.addEventListener(
              'beforetoggle',
              (evt) => {
                if (evt.newState !== 'open') return

                // Fire normal events for initial value on focus if any
                for (let element of dialog.querySelectorAll('[data-initial-value-on-focus]')) {
                  let value = element.getAttribute('data-initial-value-on-focus')
                  element.removeAttribute('data-initial-value-on-focus')
                  element.value = value
                  element.dispatchEvent(new Event('input'))
                }

                // Then, after all events have been processed, allow focusing
                setTimeout(() => {
                  dialog.inert = false
                }, 0)
              },
              { once: true },
            )

            // Now we can open the dialog
            elDialog.open = true
          }
        }
        if (customElements.get('el-dialog')) {
          onReady()
        } else {
          window.addEventListener('elements:ready', onReady)
        }
      }
    </script>
  </body>
</html>
