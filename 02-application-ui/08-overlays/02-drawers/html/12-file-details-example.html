<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
    :where(:has(:is([open], :popover-open, :open))) .hide-when-open {
      opacity: 0;
    }
    :where([data-closed]) .hide-when-closed {
      opacity: 0;
    }
    dialog::backdrop {
      background-color: transparent;
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="grid min-h-[64rem] place-content-center bg-gray-900 shadow-sm">
    <button data-open-drawer class="rounded-md bg-white/10 px-2.5 py-1.5 text-sm font-semibold text-white ring-1 ring-white/5 transition-all duration-300 hover:bg-white/20 hide-when-open">
      Open drawer
    </button>
    <dialog id="drawer" class="fixed inset-0 z-50 w-auto h-auto max-h-none max-w-none overflow-hidden bg-transparent">
      <div class="absolute inset-0 bg-gray-900/50 transition-opacity duration-500 ease-in-out data-closed:opacity-0" data-backdrop></div>

      <div tabindex="0" class="absolute inset-0 h-full pl-10 md:pl-16 focus:outline-none">
        <div class="relative ml-auto block size-full max-w-md transition duration-500 md:duration-700 data-closed:translate-x-full" data-panel>
          <!-- Close button, show/hide based on slide-over state. -->
          <div class="absolute top-0 left-0 -ml-8 flex pt-4 pr-2 duration-500 ease-in-out hide-when-closed md:-ml-10 md:pr-4">
            <button type="button" data-close-drawer class="relative rounded-md text-indigo-400 hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-600">
              <span class="absolute -inset-2.5"></span>
              <span class="sr-only">Close panel</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="w-6 h-6">
                <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>

          <!-- Slide-over panel, show/hide based on slide-over state. -->
          <div class="relative h-full overflow-y-auto bg-gray-800 p-8 after:absolute after:inset-y-0 after:left-0 after:w-px after:bg-white/10 focus:outline-none">
            <div class="space-y-6 pb-16">
              <div>
                <img
                  src="https://images.unsplash.com/photo-1582053433976-25c00369fc93?ixid=MXwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHw%3D&ixlib=rb-1.2.1&auto=format&fit=crop&w=512&q=80"
                  alt=""
                  class="flex-1 aspect-[10/7] w-full rounded-lg bg-gray-800 object-cover outline -outline-offset-1 outline-white/10" />
                <div class="mt-4 flex items-start justify-between">
                  <div>
                    <h2 class="text-base font-semibold text-white"><span class="sr-only">Details for </span>IMG_4985.HEIC</h2>
                    <p class="text-sm font-medium text-indigo-400">3.9 MB</p>
                  </div>
                  <button type="button" class="relative ml-4 flex w-8 h-8 items-center justify-center rounded-full text-indigo-400 hover:bg-white/5 hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-600">
                    <span class="absolute -inset-1.5"></span>
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.5"
                      data-slot="icon"
                      aria-hidden="true"
                      class="w-6 h-6">
                      <path
                        d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"
                        stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                    <span class="sr-only">Favorite</span>
                  </button>
                </div>
              </div>
              <div>
                <h3 class="font-medium text-white">Information</h3>
                <dl class="mt-2 divide-y divide-white/10 border-t border-b border-white/10">
                  <div class="flex justify-between py-3 text-sm font-medium">
                    <dt class="text-indigo-400">Uploaded by</dt>
                    <dd class="text-white">Marie Culver</dd>
                  </div>
                  <div class="flex justify-between py-3 text-sm font-medium">
                    <dt class="text-indigo-400">Created</dt>
                    <dd class="text-white">June 8, 2020</dd>
                  </div>
                  <div class="flex justify-between py-3 text-sm font-medium">
                    <dt class="text-indigo-400">Last modified</dt>
                    <dd class="text-white">June 8, 2020</dd>
                  </div>
                  <div class="flex justify-between py-3 text-sm font-medium">
                    <dt class="text-indigo-400">Dimensions</dt>
                    <dd class="text-white">4032 x 3024</dd>
                  </div>
                  <div class="flex justify-between py-3 text-sm font-medium">
                    <dt class="text-indigo-400">Resolution</dt>
                    <dd class="text-white">72 x 72</dd>
                  </div>
                </dl>
              </div>
              <div>
                <h3 class="font-medium text-white">Description</h3>
                <div class="mt-2 flex items-center justify-between">
                  <p class="text-sm text-indigo-400 italic">Add a description to this image.</p>
                  <button type="button" class="relative -mr-2 flex w-8 h-8 items-center justify-center rounded-full text-indigo-400 hover:bg-white/5 hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-600">
                    <span class="absolute -inset-1.5"></span>
                    <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5">
                      <path
                        d="m2.695 14.762-1.262 3.155a.5.5 0 0 0 .65.65l3.155-1.262a4 4 0 0 0 1.343-.886L17.5 5.501a2.121 2.121 0 0 0-3-3L3.58 13.419a4 4 0 0 0-.885 1.343Z" />
                    </svg>
                    <span class="sr-only">Add description</span>
                  </button>
                </div>
              </div>
              <div>
                <h3 class="font-medium text-white">Shared with</h3>
                <ul role="list" class="mt-2 divide-y divide-white/10 border-t border-b border-white/10">
                  <li class="flex items-center justify-between py-3">
                    <div class="flex items-center">
                      <img
                        src="https://images.unsplash.com/photo-1502685104226-ee32379fefbe?ixlib=rb-=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=3&w=1024&h=1024&q=80"
                        alt=""
                        class="w-8 h-8 rounded-full bg-gray-800 outline -outline-offset-1 outline-white/10" />
                      <p class="ml-4 text-sm font-medium text-white">Aimee Douglas</p>
                    </div>
                    <button type="button" class="ml-6 rounded-md text-sm font-medium text-violet-500 hover:text-violet-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-600">
                      Remove<span class="sr-only"> Aimee Douglas</span>
                    </button>
                  </li>
                  <li class="flex items-center justify-between py-3">
                    <div class="flex items-center">
                      <img
                        src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixqx=oilqXxSqey&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                        alt=""
                        class="w-8 h-8 rounded-full bg-gray-800 outline -outline-offset-1 outline-white/10" />
                      <p class="ml-4 text-sm font-medium text-white">Andrea McMillan</p>
                    </div>
                    <button type="button" class="ml-6 rounded-md text-sm font-medium text-violet-500 hover:text-violet-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-600">
                      Remove<span class="sr-only"> Andrea McMillan</span>
                    </button>
                  </li>
                  <li class="flex items-center justify-between py-2">
                    <button type="button" class="group -ml-1 flex items-center rounded-md p-1 focus-visible:outline-2 focus-visible:outline-violet-600">
                      <span class="flex w-8 h-8 items-center justify-center rounded-full border-2 border-dashed border-white/20 text-indigo-400">
                        <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5">
                          <path
                            d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" />
                        </svg>
                      </span>
                      <span class="ml-4 text-sm font-medium text-violet-500 group-hover:text-violet-400">Share</span>
                    </button>
                  </li>
                </ul>
              </div>
              <div class="flex">
                <button type="button" class="flex-1 rounded-md bg-violet-600 px-3 py-2 text-sm font-semibold text-white hover:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-600">
                  Download
                </button>
                <button type="button" class="ml-3 flex-1 rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-stone-100 ring-1 ring-white/5 hover:bg-white/20">
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </dialog>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const drawer = document.getElementById('drawer');
      const openBtn = document.querySelector('[data-open-drawer]');
      const closeBtn = document.querySelector('[data-close-drawer]');
      const backdrop = document.querySelector('[data-backdrop]');
      const panel = document.querySelector('[data-panel]');

      function openDrawer() {
        drawer.showModal();
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            panel.removeAttribute('data-closed');
            backdrop.removeAttribute('data-closed');
          });
        });
      }

      function closeDrawer() {
        panel.setAttribute('data-closed', '');
        backdrop.setAttribute('data-closed', '');
        setTimeout(() => {
          drawer.close();
        }, 700);
      }

      openBtn.addEventListener('click', openDrawer);
      closeBtn.addEventListener('click', closeDrawer);
      backdrop.addEventListener('click', closeDrawer);

      drawer.addEventListener('cancel', (e) => {
        e.preventDefault();
        closeDrawer();
      });

      // Start with drawer open
      drawer.showModal();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          panel.removeAttribute('data-closed');
          backdrop.removeAttribute('data-closed');
        });
      });
    });
  </script>
</body>
</html>
