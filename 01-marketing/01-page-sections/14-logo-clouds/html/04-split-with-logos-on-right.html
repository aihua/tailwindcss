<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="bg-gray-900 py-24 sm:py-32">
      <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="grid grid-cols-1 items-center gap-x-8 gap-y-16 lg:grid-cols-2">
          <div class="mx-auto w-full max-w-xl lg:mx-0">
            <h2 class="text-4xl font-semibold tracking-tight text-pretty text-white sm:text-5xl">Trusted by the most innovative teams</h2>
            <p class="mt-6 text-lg/8 text-gray-300">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Et, egestas tempus tellus etiam sed. Quam a scelerisque amet ullamcorper eu enim et fermentum, augue.</p>
            <div class="mt-8 flex items-center gap-x-6">
              <a href="#" class="rounded-md bg-indigo-500 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Create account</a>
              <a href="#" class="text-sm font-semibold text-white hover:text-gray-200">Contact us <span aria-hidden="true">&rarr;</span></a>
            </div>
          </div>
          <div class="mx-auto grid w-full max-w-xl grid-cols-2 items-center gap-y-12 sm:gap-y-14 lg:mx-0 lg:max-w-none lg:pl-8">
            <img width="105" height="48" src="https://tailwindcss.com/plus-assets/img/logos/tuple-logo-white.svg" alt="Tuple" class="max-h-12 w-full object-contain object-left" />
            <img width="104" height="48" src="https://tailwindcss.com/plus-assets/img/logos/reform-logo-white.svg" alt="Reform" class="max-h-12 w-full object-contain object-left" />
            <img width="140" height="48" src="https://tailwindcss.com/plus-assets/img/logos/savvycal-logo-white.svg" alt="SavvyCal" class="max-h-12 w-full object-contain object-left" />
            <img width="136" height="48" src="https://tailwindcss.com/plus-assets/img/logos/laravel-logo-white.svg" alt="Laravel" class="max-h-12 w-full object-contain object-left" />
            <img width="158" height="48" src="https://tailwindcss.com/plus-assets/img/logos/transistor-logo-white.svg" alt="Transistor" class="max-h-12 w-full object-contain object-left" />
            <img width="147" height="48" src="https://tailwindcss.com/plus-assets/img/logos/statamic-logo-white.svg" alt="Statamic" class="max-h-12 w-full object-contain object-left" />
          </div>
        </div>
      </div>
    </div>

</html>
