<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
  <style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="flex items-center justify-center bg-gray-900 p-8 dark">
    <div class="mx-auto w-full max-w-80">
      <div>
        <label for="company-website" class="block text-sm font-medium text-white">Company website</label>
        <div class="mt-2 flex">
          <div class="flex shrink-0 items-center rounded-l-lg bg-white/5 px-3 text-base text-zinc-400 outline outline-solid -outline-offset-1 outline-zinc-800 sm:text-sm">https://</div>
          <input id="company-website" type="text" name="company-website" placeholder="www.example.com" class="-ml-px block w-full grow rounded-r-lg bg-white/5 px-3 py-1.5 text-base text-white outline outline-solid -outline-offset-1 outline-zinc-800 placeholder-gray-500 focus:outline-2 focus:outline-solid focus:-outline-offset-2 focus:outline-violet-400 sm:text-sm" />
        </div>
      </div>
    </div>
  </div>
  <script></script>
</body>
</html>
