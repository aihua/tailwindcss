<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="min-h-90 bg-gray-900 p-8 dark">
    <div class="mx-auto flex w-64 justify-end">
      <el-dropdown data-default-open class="inline-block">
        <button class="inline-flex w-full justify-center gap-1.5 rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white ring-inset ring-1 ring-white/5 hover:bg-white/20">
          Options
          <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="-mr-1 h-5 w-5 text-gray-400">
            <path
              d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
              clip-rule="evenodd"
              fill-rule="evenodd" />
          </svg>
        </button>

        <el-menu
          anchor="bottom end"
          popover
          class="w-56 origin-top-right divide-y divide-white/10 rounded-md bg-gray-800 outline outline-1 -outline-offset-1 outline-white/10 transition-all transition-discrete [--anchor-gap:calc(0.25rem*2)] data-[closed]:scale-95 data-[closed]:opacity-0 data-[enter]:duration-100 data-[enter]:ease-out data-[leave]:duration-75 data-[leave]:ease-in">
          <div class="px-4 py-3">
            <p class="text-sm text-gray-400">Signed in as</p>
            <p class="truncate text-sm font-medium text-white">tom@example.com</p>
          </div>
          <div class="py-1">
            <a href="#" class="block px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-none">Account settings</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-none">Support</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-none">License</a>
          </div>
          <div class="py-1">
            <form action="#" method="POST">
              <button type="submit" class="block w-full px-4 py-2 text-left text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-none">Sign out</button>
            </form>
          </div>
        </el-menu>
      </el-dropdown>
    </div>
  </div>
  <script>
    {
      function onReady() {
        let menus = document.querySelectorAll('el-dropdown[data-default-open] el-menu');
        menus.forEach(menu => {
          let originalScrollIntoView = Element.prototype.scrollIntoView;
          Element.prototype.scrollIntoView = () => {
            Element.prototype.scrollIntoView = originalScrollIntoView;
          };
          menu.showPopover();
        });
      }
      if (customElements.get('el-dropdown')) {
        onReady();
      } else {
        window.addEventListener('elements:ready', onReady);
      }
    }
  </script>
</body>
</html>
