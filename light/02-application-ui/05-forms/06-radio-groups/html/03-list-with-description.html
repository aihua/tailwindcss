<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="flex justify-center bg-white px-4 py-12">
      <fieldset aria-label="Plan">
        <div class="space-y-5">
          <div class="relative flex items-start">
            <div class="flex h-6 items-center">
              <input id="small" type="radio" name="plan" checked aria-describedby="small-description" class="relative size-4 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 pju appearance-auto pkj" />
            </div>
            <div class="ml-3 text-sm/6">
              <label for="small" class="font-medium text-gray-900">Small</label>
              <p id="small-description" class="text-gray-500">4 GB RAM / 2 CPUS / 80 GB SSD Storage</p>
            </div>
          </div>
          <div class="relative flex items-start">
            <div class="flex h-6 items-center">
              <input id="medium" type="radio" name="plan" aria-describedby="medium-description" class="relative size-4 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 pju appearance-auto pkj" />
            </div>
            <div class="ml-3 text-sm/6">
              <label for="medium" class="font-medium text-gray-900">Medium</label>
              <p id="medium-description" class="text-gray-500">8 GB RAM / 4 CPUS / 160 GB SSD Storage</p>
            </div>
          </div>
          <div class="relative flex items-start">
            <div class="flex h-6 items-center">
              <input id="large" type="radio" name="plan" aria-describedby="large-description" class="relative size-4 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 pju appearance-auto pkj" />
            </div>
            <div class="ml-3 text-sm/6">
              <label for="large" class="font-medium text-gray-900">Large</label>
              <p id="large-description" class="text-gray-500">16 GB RAM / 8 CPUS / 320 GB SSD Storage</p>
            </div>
          </div>
        </div>
      </fieldset>
    </div>
  </body>
</html>
