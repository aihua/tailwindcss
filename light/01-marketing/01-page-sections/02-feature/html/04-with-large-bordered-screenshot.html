<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="overflow-hidden bg-white py-24 sm:py-32">
      <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <p class="max-w-2xl text-5xl font-semibold tracking-tight text-pretty text-gray-900 sm:text-6xl sm:text-balance">Everything you need to deploy your app</p>
        <div class="relative mt-16 aspect-[2432/1442] h-144 sm:h-auto sm:w-[calc(theme(container.7xl)-4rem)]">
          <div class="absolute -inset-2 rounded-[calc(theme(radius.xl)+0.5rem)] shadow-xs ring-1 ring-black/5"></div>
          <img src="https://tailwindcss.com/plus-assets/img/component-images/project-app-screenshot.png" alt="" class="h-full rounded-xl shadow-2xl ring-1 ring-black/10" />
        </div>
      </div>
    </div>
  </body>
</html>
