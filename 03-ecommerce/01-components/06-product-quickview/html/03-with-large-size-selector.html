<!doctype html>
<html lang="en">

    <style type="text/tailwindcss">

        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";

  <body class="antialiased">
    <div class="flex min-h-[700px]">
      <div style="height: 700px" class="flex w-full items-center justify-center bg-white px-4 sm:px-6 lg:px-8">
        <div class="w-72">
          <div>
            <div class="group relative flex flex-col-reverse">
              <div class="mt-4 flex items-center justify-between text-base font-medium text-gray-900">
                <h3>
                  <a href="#">Everyday Ruck Snack</a>
                </h3>

              </div>

            </div>

                  <div class="flex min-h-full items-stretch justify-center text-center sm:items-center sm:px-2 lg:px-4">
                    <!-- Modal panel, show/hide based on modal state. -->

                      <div class="relative flex w-full items-center overflow-hidden bg-white px-4 pt-14 pb-8 shadow-2xl sm:px-6 sm:pt-8 sm:p-6 lg:p-8">
                        <button type="button" command="close" commandfor="dialog-1" class="absolute top-4 right-4 text-gray-400 hover:text-gray-500 sm:top-8 sm:right-6 lg:top-8 lg:right-8">

                          </svg>
                        </button>

                        <div class="grid w-full grid-cols-1 items-start gap-y-8 gap-x-6 sm:grid-cols-12 sm:gap-x-8 lg:items-start lg:gap-x-8">

                            <img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-quick-preview-03-detail.jpg" alt="Interior of light green canvas bag with padded laptop sleeve and internal organization pouch." class="aspect-square w-full rounded-lg bg-gray-100 object-cover" />
                            <p class="absolute top-4 left-4 text-center sm:static sm:mt-6">
                              <a href="#" class="text-base font-medium text-indigo-600 hover:text-indigo-500">View full details</a>
                            </p>
                          </div>
                          <div class="sm:col-span-7 lg:col-span-7">

                                        <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />
                                      </svg>
                                      <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="h-5 w-5 shrink-0 text-yellow-400">
                                        <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />
                                      </svg>

                                        <path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401Z" clip-rule="evenodd" fill-rule="evenodd" />

                              <form>
                                <div class="flex justify-between">
                                  <!-- Size selector -->

                                    <div class="mt-1 grid grid-cols-1 gap-4 sm:grid-cols-2">

                                        </div>
                                        <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="invisible h-5 w-5 text-indigo-600 group-has-[:checked]:visible">

                                        <input type="radio" name="size" value="20L" class="absolute inset-0 appearance-none focus:outline-none" />

                                        </div>
                                        <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="invisible h-5 w-5 text-indigo-600 group-has-[:checked]:visible">

                                  </a>

                                <div class="mt-6">

                                </div>
                                <div class="mt-6 text-center">

                        </div>
                      </div>
                    </el-dialog-panel>
                  </div>
                </div>
              </dialog>

          </div>
        </div>
      </div>
    </div>
    <script>
      {
        function onReady() {
          for (let elDialog of document.querySelectorAll('el-dialog')) {
            let dialog = elDialog.querySelector('dialog')

            // Mark dialog as inert to prevent focus from moving inside
            dialog.inert = true

            dialog.addEventListener(
              'beforetoggle',
              (evt) => {
                if (evt.newState !== 'open') return

                // Fire normal events for initial value on focus if any
                for (let element of dialog.querySelectorAll('[data-initial-value-on-focus]')) {
                  let value = element.getAttribute('data-initial-value-on-focus')
                  element.removeAttribute('data-initial-value-on-focus')
                  element.value = value
                  element.dispatchEvent(new Event('input'))
                }

                // Then, after all events have been processed, allow focusing
                setTimeout(() => {
                  dialog.inert = false
                }, 0)
              },
              { once: true },
            )

            // Now we can open the dialog
            elDialog.open = true
          }
        }
        if (customElements.get('el-dialog')) {
          onReady()
        } else {
          window.addEventListener('elements:ready', onReady)
        }
      }
    </script>
  </body>
