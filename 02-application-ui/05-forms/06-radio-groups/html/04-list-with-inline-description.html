<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex justify-center bg-gray-900 px-4 py-12 scheme-dark">
      <fieldset aria-label="Plan">
        <div class="space-y-5">
          <div class="relative flex items-start">
            <div class="flex h-6 items-center">
              <input id="small" type="radio" name="plan" checked aria-describedby="small-description" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            </div>
            <div class="ml-3 text-sm leading-6">
              <label for="small" class="font-medium text-white">Small</label>
              <span id="small-description" class="text-gray-400">4 GB RAM / 2 CPUS / 80 GB SSD Storage</span>
            </div>
          </div>
          <div class="relative flex items-start">
            <div class="flex h-6 items-center">
              <input id="medium" type="radio" name="plan" aria-describedby="medium-description" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            </div>
            <div class="ml-3 text-sm leading-6">
              <label for="medium" class="font-medium text-white">Medium</label>
              <span id="medium-description" class="text-gray-400">8 GB RAM / 4 CPUS / 160 GB SSD Storage</span>
            </div>
          </div>
          <div class="relative flex items-start">
            <div class="flex h-6 items-center">
              <input id="large" type="radio" name="plan" aria-describedby="large-description" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            </div>
            <div class="ml-3 text-sm leading-6">
              <label for="large" class="font-medium text-white">Large</label>
              <span id="large-description" class="text-gray-400">16 GB RAM / 8 CPUS / 320 GB SSD Storage</span>
            </div>
          </div>
        </div>
      </fieldset>
    </div>
  </body>
</html>
