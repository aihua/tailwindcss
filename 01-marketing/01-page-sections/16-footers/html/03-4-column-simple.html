<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      --color-dark-bg: oklch(21% 0.034 264.665);
      --color-muted: oklch(70.7% 0.022 261.325);
    }
  </style>
</head>
<body class="antialiased bg-dark-bg">
  <footer class="bg-dark-bg">
    <div class="mx-auto max-w-7xl px-6 py-16 sm:py-24 lg:px-8 lg:py-32">
      <div class="2xl:grid 2xl:grid-cols-3 2xl:gap-8">
        <img
          src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
          alt="Company name"
          class="h-9"
        />
        <div class="mt-16 grid grid-cols-2 gap-8 2xl:col-span-2 2xl:mt-0">
          <div class="md:grid md:grid-cols-2 md:gap-8">
            <div>
              <h3 class="text-sm leading-6 font-semibold text-white">Solutions</h3>
              <ul role="list" class="mt-6 space-y-4">
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Marketing</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Analytics</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Automation</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Commerce</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Insights</a></li>
              </ul>
            </div>
            <div class="mt-10 md:mt-0">
              <h3 class="text-sm leading-6 font-semibold text-white">Support</h3>
              <ul role="list" class="mt-6 space-y-4">
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Submit ticket</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Documentation</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Guides</a></li>
              </ul>
            </div>
          </div>
          <div class="md:grid md:grid-cols-2 md:gap-8">
            <div>
              <h3 class="text-sm leading-6 font-semibold text-white">Company</h3>
              <ul role="list" class="mt-6 space-y-4">
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">About</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Blog</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Jobs</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Press</a></li>
              </ul>
            </div>
            <div class="mt-10 md:mt-0">
              <h3 class="text-sm leading-6 font-semibold text-white">Legal</h3>
              <ul role="list" class="mt-6 space-y-4">
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Terms of service</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">Privacy policy</a></li>
                <li><a href="#" class="text-sm leading-6 text-muted hover:text-white">License</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
