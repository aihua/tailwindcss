<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Constrained Three Column - Tailwind CSS v4</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: oklch(21% 0.034 264.665);
    }
  </style>
</head>
<body>
  <div class="bg-gray-900 [color-scheme:dark]">
    <!--
    This example requires updating your template:

    ```
    <html class="h-full bg-gray-900">
    <body class="h-full">
    ```
  -->
    <div class="flex min-h-full flex-col">
      <header class="relative shrink-0 bg-gray-900 before:pointer-events-none before:absolute before:inset-0 before:border-b before:border-white/10 before:bg-black/10">
        <div class="relative mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
          <img
            src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
            alt="Your Company"
            class="h-8 w-auto" />
          <div class="flex items-center gap-x-8">
            <button type="button" class="-m-2.5 p-2.5 text-gray-400 hover:text-white">
              <span class="sr-only">View notifications</span>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                data-slot="icon"
                aria-hidden="true"
                class="w-6 h-6">
                <path
                  d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
                  stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
            <a href="#" class="-m-1.5 p-1.5">
              <span class="sr-only">Your profile</span>
              <img
                src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                alt=""
                class="w-8 h-8 rounded-full bg-gray-800 outline -outline-offset-1 outline-white/10" />
            </a>
          </div>
        </div>
      </header>

      <!-- 3 column wrapper -->
      <div class="mx-auto w-full max-w-7xl grow lg:flex 2xl:px-2">
        <!-- Left sidebar & main wrapper -->
        <div class="flex-1 2xl:flex">
          <div class="border-b border-white/10 px-4 py-6 sm:px-6 lg:pl-8 2xl:w-64 2xl:shrink-0 2xl:border-r 2xl:border-b-0 2xl:pl-6">
            <x-placeholder message="Left column area">
              <div class="relative h-48 overflow-hidden rounded-xl border border-dashed border-white/20 opacity-75 2xl:h-[608px]">
                <svg fill="none" class="absolute inset-0 w-full h-full stroke-white/10">
                  <defs>
                    <pattern
                      id="pattern-e65c4c0f-2107-4ff8-8f1a-e4204a4fd15f"
                      width="10"
                      height="10"
                      x="0"
                      y="0"
                      patternUnits="userSpaceOnUse">
                      <path d="M-3 13 15-5M-5 5l18-18M-1 21 17 3" />
                    </pattern>
                  </defs>
                  <rect
                    width="100%"
                    height="100%"
                    fill="url(#pattern-e65c4c0f-2107-4ff8-8f1a-e4204a4fd15f)"
                    stroke="none" />
                </svg>
              </div>
            </x-placeholder>
          </div>

          <div class="px-4 py-6 sm:px-6 lg:pl-8 2xl:flex-1 2xl:pl-6">
            <x-placeholder message="Main area">
              <div class="relative h-[367px] overflow-hidden rounded-xl border border-dashed border-white/20 opacity-75 2xl:h-[608px]">
                <svg fill="none" class="absolute inset-0 w-full h-full stroke-white/10">
                  <defs>
                    <pattern
                      id="pattern-7b69d9f9-ca30-48c9-a80a-268e7b084e52"
                      width="10"
                      height="10"
                      x="0"
                      y="0"
                      patternUnits="userSpaceOnUse">
                      <path d="M-3 13 15-5M-5 5l18-18M-1 21 17 3" />
                    </pattern>
                  </defs>
                  <rect
                    width="100%"
                    height="100%"
                    fill="url(#pattern-7b69d9f9-ca30-48c9-a80a-268e7b084e52)"
                    stroke="none" />
                </svg>
              </div>
            </x-placeholder>
          </div>
        </div>

        <div class="shrink-0 border-t border-white/10 px-4 py-6 sm:px-6 lg:h-full lg:w-96 lg:border-t-0 lg:border-l lg:pr-8 2xl:pr-6">
          <x-placeholder message="Right column area">
            <div class="relative h-64 overflow-hidden rounded-xl border border-dashed border-white/20 opacity-75 lg:h-full 2xl:h-[608px]">
              <svg fill="none" class="absolute inset-0 w-full h-full stroke-white/10">
                <defs>
                  <pattern
                    id="pattern-1b61a508-0497-4b7f-8a04-44300b5c3e3a"
                    width="10"
                    height="10"
                    x="0"
                    y="0"
                    patternUnits="userSpaceOnUse">
                    <path d="M-3 13 15-5M-5 5l18-18M-1 21 17 3" />
                  </pattern>
                </defs>
                <rect
                  width="100%"
                  height="100%"
                  fill="url(#pattern-1b61a508-0497-4b7f-8a04-44300b5c3e3a)"
                  stroke="none" />
              </svg>
            </div>
          </x-placeholder>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
