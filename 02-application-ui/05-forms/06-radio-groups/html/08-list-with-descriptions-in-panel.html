<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex justify-center bg-gray-900 px-8 py-12 scheme-dark">
      <div class="mx-auto w-full max-w-3xl">
        <fieldset aria-label="Privacy setting" class="-space-y-px rounded-md bg-gray-800/50">
          <label aria-label="Public access" aria-description="This project would be available to anyone who has the link" class="group flex border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none has-[:checked]:relative has-[:checked]:border-indigo-800 has-[:checked]:bg-indigo-500/10">
            <input type="radio" name="privacy-setting" value="public" checked class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            <span class="ml-3 flex flex-col">
              <span class="block text-sm font-medium text-white group-has-[:checked]:text-indigo-300">Public access</span>
              <span class="block text-sm text-gray-400 group-has-[:checked]:text-indigo-300/75">This project would be available to anyone who has the link</span>
            </span>
          </label>
          <label aria-label="Private to project members" aria-description="Only members of this project would be able to access" class="group flex border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none has-[:checked]:relative has-[:checked]:border-indigo-800 has-[:checked]:bg-indigo-500/10">
            <input type="radio" name="privacy-setting" value="private-to-project-members" class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            <span class="ml-3 flex flex-col">
              <span class="block text-sm font-medium text-white group-has-[:checked]:text-indigo-300">Private to project members</span>
              <span class="block text-sm text-gray-400 group-has-[:checked]:text-indigo-300/75">Only members of this project would be able to access</span>
            </span>
          </label>
          <label aria-label="Private to you" aria-description="You are the only one able to access this project" class="group flex border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none has-[:checked]:relative has-[:checked]:border-indigo-800 has-[:checked]:bg-indigo-500/10">
            <input type="radio" name="privacy-setting" value="private-to-you" class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            <span class="ml-3 flex flex-col">
              <span class="block text-sm font-medium text-white group-has-[:checked]:text-indigo-300">Private to you</span>
              <span class="block text-sm text-gray-400 group-has-[:checked]:text-indigo-300/75">You are the only one able to access this project</span>
            </span>
          </label>
        </fieldset>
      </div>
    </div>
  </body>
</html>
