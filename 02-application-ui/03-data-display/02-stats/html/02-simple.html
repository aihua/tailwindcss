<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.14"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="bg-gray-900">
    <div class="mx-auto max-w-[80rem]">
      <div class="grid grid-cols-1 gap-px bg-white/10 sm:grid-cols-2 lg:grid-cols-4">
        <div class="bg-gray-900 px-4 py-6 sm:px-6 lg:px-8">
          <p class="text-sm leading-6 font-medium text-gray-400">Number of deploys</p>
          <p class="mt-2 flex items-baseline gap-x-2">
            <span class="text-4xl font-semibold tracking-tight text-white">405</span>
          </p>
        </div>
        <div class="bg-gray-900 px-4 py-6 sm:px-6 lg:px-8">
          <p class="text-sm leading-6 font-medium text-gray-400">Average deploy time</p>
          <p class="mt-2 flex items-baseline gap-x-2">
            <span class="text-4xl font-semibold tracking-tight text-white">3.65</span>
            <span class="text-sm text-gray-400">mins</span>
          </p>
        </div>
        <div class="bg-gray-900 px-4 py-6 sm:px-6 lg:px-8">
          <p class="text-sm leading-6 font-medium text-gray-400">Number of servers</p>
          <p class="mt-2 flex items-baseline gap-x-2">
            <span class="text-4xl font-semibold tracking-tight text-white">3</span>
          </p>
        </div>
        <div class="bg-gray-900 px-4 py-6 sm:px-6 lg:px-8">
          <p class="text-sm leading-6 font-medium text-gray-400">Success rate</p>
          <p class="mt-2 flex items-baseline gap-x-2">
            <span class="text-4xl font-semibold tracking-tight text-white">98.5%</span>
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
