<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div class="min-h-[192px] bg-gray-100">
  <!-- When the mobile menu is open, add `overflow-hidden` to the `body` element to prevent double scrollbars -->
  <header class="relative bg-white shadow-xs anhz">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="relative flex justify-between lg:gap-8 xl:grid xl:grid-cols-12">
        <div class="flex md:absolute md:inset-y-0 md:left-0 lg:static xl:col-span-2">
          <div class="flex shrink-0 items-center">
            <a href="#">
              <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=600" alt="Your Company" class="h-8 w-auto" />
            </a>
          </div>
        </div>
        <div class="min-w-[0] flex-1 md:px-8 lg:px-[0] xl:col-span-6">
          <div class="flex items-center px-6 py-[0.875rem] md:mx-auto md:max-w-3xl lg:mx-[0] lg:max-w-none xl:px-[0]">
            <div class="grid w-full grid-cols-1">
              <input name="search" placeholder="Search" class="col-start-[1] row-start-1 block w-full rounded-[.375rem] bg-white py-1.5 pr-3 pl-10 text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-[.875rem] sm:leading-6" />
              <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="pointer-events-none col-start-[1] row-start-1 ml-3 w-5 h-5 self-center text-gray-400">
                <path d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" fill-rule="evenodd" />
              </svg>
            </div>
          </div>
        </div>
        <div class="flex items-center md:absolute md:inset-y-0 md:right-0 lg:hidden">
          <!-- Mobile menu button -->
          <button popovertarget="mobile-menu-popover" class="relative -mx-2 inline-flex items-center justify-center rounded-[.375rem] p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-500 focus:outline-2 focus:-outline-offset-1 focus:outline-indigo-600">
            <span class="absolute -inset-0.5"></span>
            <span class="sr-only">Open menu</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="w-6 h-6 [aria-expanded=true]_&]:hidden">
              <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="w-6 h-6 hidden [aria-expanded=true]_&]:block">
              <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <div class="lg:flex lg:items-center lg:justify-end xl:col-span-4">
          <button type="button" class="relative ml-5 shrink-0 rounded-full p-1 text-gray-400 hover:text-gray-500 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-600">
            <span class="absolute -inset-1.5"></span>
            <span class="sr-only">View notifications</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="w-6 h-6">
              <path d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <!-- Profile dropdown -->
          <el-dropdown class="relative ml-5 shrink-0">
            <button class="relative flex rounded-full focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
              <span class="absolute -inset-1.5"></span>
              <span class="sr-only">Open user menu</span>
              <img src="https://images.unsplash.com/photo-1550525811-e5869dd03032?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="" class="w-8 h-8 rounded-full bg-gray-100 outline-1 -outline-offset-1 outline-[oklab(0%_none_none/.05)]" />
            </button>

            <el-menu anchor="bottom end" popover class="w-48 origin-top-right rounded-[.375rem] bg-white py-1 shadow-lg outline-1 outline-[oklab(0%_none_none/.05)] transition ease-in-out duration-[var(--tw-duration,.15s)] transition-discrete [--anchor-gap:calc(.25rem*2)] data-[closed]:scale-[95%] data-[closed]:transform-gpu data-[closed]:opacity-[0] data-[enter]:duration-100 data-[enter]:ease-out data-[leave]:duration-75 data-[leave]:ease-in">
              <a href="#" class="block px-4 py-2 text-[.875rem] leading-[1.4285714285714286] text-gray-700 focus:bg-gray-100 focus:outline-none focus:outline-offset-2">Your profile</a>
              <a href="#" class="block px-4 py-2 text-[.875rem] leading-[1.4285714285714286] text-gray-700 focus:bg-gray-100 focus:outline-none focus:outline-offset-2">Settings</a>
              <a href="#" class="block px-4 py-2 text-[.875rem] leading-[1.4285714285714286] text-gray-700 focus:bg-gray-100 focus:outline-none focus:outline-offset-2">Sign out</a>
            </el-menu>
          </el-dropdown>

          <a href="#" class="ml-6 inline-flex items-center rounded-[.375rem] bg-indigo-600 px-3 py-2 text-[.875rem] leading-[1.4285714285714286] font-semibold text-white shadow-xs hover:bg-[oklch(58.5%_.233_277.117)] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">New Project</a>
        </div>
      </div>
    </div>

    <el-popover id="mobile-menu-popover" anchor="bottom" popover aria-label="Global" class="relative w-full overflow-visible [--anchor-gap:calc(.25rem*2)] backdrop:bg-transparent angd lg:hidden">
      <div class="relative mx-auto max-w-3xl space-y-1 px-2 pt-2 pb-3 sm:px-4">
        <!-- Current: "bg-gray-100 text-gray-900", Default: "text-gray-900 hover:bg-gray-50" -->
        <a href="#" aria-current="page" class="block rounded-[.375rem] bg-gray-100 px-3 py-2 text-base leading-[1.5] font-medium text-gray-900">Dashboard</a>
        <a href="#" class="block rounded-[.375rem] px-3 py-2 text-base leading-[1.5] font-medium text-gray-900 hover:bg-gray-50">Calendar</a>
        <a href="#" class="block rounded-[.375rem] px-3 py-2 text-base leading-[1.5] font-medium text-gray-900 hover:bg-gray-50">Teams</a>
        <a href="#" class="block rounded-[.375rem] px-3 py-2 text-base leading-[1.5] font-medium text-gray-900 hover:bg-gray-50">Directory</a>
      </div>
      <div class="relative border-t border-gray-200 pt-4 pb-3">
        <div class="mx-auto flex max-w-3xl items-center px-4 sm:px-6">
          <div class="shrink-0">
            <img src="https://images.unsplash.com/photo-1550525811-e5869dd03032?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="" class="w-10 h-10 rounded-full bg-gray-100 outline-1 -outline-offset-1 outline-[oklab(0%_none_none/.05)]" />
          </div>
          <div class="ml-3">
            <div class="text-base leading-[1.5] font-medium text-gray-800">Chelsea Hagon</div>
            <div class="text-[.875rem] leading-[1.4285714285714286] font-medium text-gray-500">chelsea.hagon@example.com</div>
          </div>
          <button type="button" class="relative ml-auto shrink-0 rounded-full p-1 text-gray-400 hover:text-gray-500 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-600">
            <span class="absolute -inset-1.5"></span>
            <span class="sr-only">View notifications</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="w-6 h-6">
              <path d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <div class="mx-auto mt-3 max-w-3xl space-y-1 px-2 sm:px-4">
          <a href="#" class="block rounded-[.375rem] px-3 py-2 text-base leading-[1.5] font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-900">Your profile</a>
          <a href="#" class="block rounded-[.375rem] px-3 py-2 text-base leading-[1.5] font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-900">Settings</a>
          <a href="#" class="block rounded-[.375rem] px-3 py-2 text-base leading-[1.5] font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-900">Sign out</a>
        </div>
      </div>
    </el-popover>
  </header>
</div>
  </body>
</html>
