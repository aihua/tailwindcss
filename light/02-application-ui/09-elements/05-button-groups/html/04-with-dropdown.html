<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div style="min-height: 256px" class="flex items-start justify-center bg-white p-8">
  <div class="inline-flex rounded-md shadow-xs">
    <button type="button" class="relative inline-flex items-center rounded-tl-md rounded-bl-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 inset-ring-1 inset-ring-gray-300 hover:bg-gray-50 focus:z-10">Save changes</button>
    <el-dropdown open data-default-open class="relative -ml-px block">
      <button class="relative inline-flex items-center rounded-tr-md rounded-br-md bg-white px-2 py-2 text-gray-400 inset-ring-1 inset-ring-gray-300 hover:bg-gray-50 focus:z-10">
        <span class="sr-only whitespace-nowrap border-0 w-px h-px -m-px p-0 absolute overflow-hidden">Open options</span>
        <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5">
          <path d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
        </svg>
      </button>
      <el-menu anchor="bottom end" popover class="ml-1 w-56 origin-top-right rounded-md bg-white shadow-lg outline-1 outline-black/5 transition transition-discrete [--anchor-gap:calc(.25rem*2)] data-[closed]:scale-95 data-[closed]:opacity-0 data-[enter]:duration-100 data-[enter]:ease-in data-[leave]:duration-75 data-[leave]:ease-in">
        <div class="py-1">
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 focus:bg-gray-100 focus:text-gray-900">Save and schedule</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 focus:bg-gray-100 focus:text-gray-900">Save and publish</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 focus:bg-gray-100 focus:text-gray-900">Export PDF</a>
        </div>
      </el-menu>
    </el-dropdown>
  </div>
</div>
<script>
  {
    function onReady() {
      let menus = document.querySelectorAll('el-dropdown[data-default-open] el-menu')
      menus.forEach((menu) => {
        // Ignore next scrollIntoView call
        let originalScrollIntoView = Element.prototype.scrollIntoView
        Element.prototype.scrollIntoView = () => {
          Element.prototype.scrollIntoView = originalScrollIntoView
        }
        menu.showPopover()
      })
    }
    if (customElements.get('el-dropdown')) {
      onReady()
    } else {
      window.addEventListener('elements:ready', onReady)
    }
  }
</script>

  </body>
</html>
