<!doctype html>
<html lang="en">
  <head>

    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>

  <body class="antialiased">
<div style="min-height: 320px" class="bg-gray-100">
  <!-- Global notification live region, render this permanently at the end of the document -->
  <div aria-live="assertive" class="pointer-events-none fixed inset-0 flex items-end px-4 py-6 sm:items-start sm:p-6">
    <div class="flex w-full flex-col items-center space-y-4 sm:items-end">
      <!-- Notification panel, dynamically insert this into the live region when it needs to be displayed -->
      <div class="pointer-events-auto w-full max-w-96 translate-y-0 rounded-[.5rem] bg-white opacity-100 shadow-lg outline-1 outline-[oklab(0%_none_none/.05)] transition-color,background-color,border-color,outline-color,text-decoration-color,fill,stroke,--tw-gradient-from,--tw-gradient-via,--tw-gradient-to,opacity,box-shadow,transform,translate,scale,rotate,filter,-webkit-backdrop-filter,backdrop-filter,display,content-visibility,overlay,pointer-events sm:translate-x-0">
        <div class="p-4">
          <div class="flex items-center">
            <div class="flex w-0 flex-1 justify-between">
              <p class="w-0 flex-1 text-sm font-medium text-gray-900">Discussion archived</p>
              <button type="button" class="ml-3 shrink-[0] rounded-[.375rem] bg-white text-sm font-medium text-indigo-600 hover:text-indigo-500 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-500">Undo</button>
            </div>
            <div class="ml-4 flex shrink-[0]">
              <button type="button" class="inline-flex rounded-[.375rem] text-gray-400 hover:text-gray-500 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-600">
                <span class="sr-only whitespace-nowrap border-0 w-[0.0625rem] h-[0.0625rem] -m-[0.0625rem] p-0 absolute overflow-hidden">Close</span>
                <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5">
                  <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script></script>
  </body>
</html>
