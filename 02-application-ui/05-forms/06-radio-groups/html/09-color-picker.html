<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="flex justify-center bg-gray-900 px-8 py-12">
    <fieldset>
      <legend class="block text-sm/6 font-semibold text-white">Choose a label color</legend>
      <div class="mt-6 flex items-center gap-x-3">
        <div class="flex rounded-full outline -outline-offset-1 outline-black/10">
          <input
            type="radio"
            name="color"
            value="pink"
            checked
            aria-label="Pink"
            class="size-8 appearance-none rounded-full bg-rose-500 forced-color-adjust-none checked:outline-2 checked:outline-offset-2 checked:outline-rose-500 focus-visible:outline-3 focus-visible:outline-offset-3" />
        </div>
        <div class="flex rounded-full outline -outline-offset-1 outline-black/10">
          <input
            type="radio"
            name="color"
            value="purple"
            aria-label="Purple"
            class="size-8 appearance-none rounded-full bg-purple-500 forced-color-adjust-none checked:outline-2 checked:outline-offset-2 checked:outline-purple-500 focus-visible:outline-3 focus-visible:outline-offset-3" />
        </div>
        <div class="flex rounded-full outline -outline-offset-1 outline-black/10">
          <input
            type="radio"
            name="color"
            value="blue"
            aria-label="Blue"
            class="size-8 appearance-none rounded-full bg-blue-500 forced-color-adjust-none checked:outline-2 checked:outline-offset-2 checked:outline-blue-500 focus-visible:outline-3 focus-visible:outline-offset-3" />
        </div>
        <div class="flex rounded-full outline -outline-offset-1 outline-black/10">
          <input
            type="radio"
            name="color"
            value="green"
            aria-label="Green"
            class="size-8 appearance-none rounded-full bg-emerald-500 forced-color-adjust-none checked:outline-2 checked:outline-offset-2 checked:outline-emerald-500 focus-visible:outline-3 focus-visible:outline-offset-3" />
        </div>
        <div class="flex rounded-full outline -outline-offset-1 outline-black/10">
          <input
            type="radio"
            name="color"
            value="yellow"
            aria-label="Yellow"
            class="size-8 appearance-none rounded-full bg-amber-300 forced-color-adjust-none checked:outline-2 checked:outline-offset-2 checked:outline-amber-300 focus-visible:outline-3 focus-visible:outline-offset-3" />
        </div>
      </div>
    </fieldset>
  </div>
</body>
</html>
