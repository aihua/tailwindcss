<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      --color-panel: oklab(27.8% -0.00750866 -0.0321344 / 0.5);
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="flex justify-center bg-gray-900 px-8 py-12 dark">
    <div class="mx-auto w-full max-w-3xl">
      <fieldset aria-label="Pricing plans" class="relative -space-y-px rounded-md bg-panel">
        <label
          aria-label="Startup"
          aria-description="$29 per month, $290 per year, Up to 5 active job postings"
          class="group flex flex-col border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none forced:focus:outline-2 forced:focus:outline-offset-2 forced:focus:outline-transparent has-[:checked]:relative has-[:checked]:border-violet-700 has-[:checked]:bg-violet-600/10 md:grid md:grid-cols-3 md:pr-6 md:pl-4">
          <span class="flex items-center gap-3 text-sm/5">
            <input
              type="radio"
              name="pricing-plan"
              value="startup"
              checked
              class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden" />
            <span class="font-medium text-white group-has-[:checked]:text-violet-400">Startup</span>
          </span>
          <span class="ml-6 pl-1 text-sm/5 md:ml-0 md:pl-0 md:text-center">
            <span class="font-medium text-white group-has-[:checked]:text-violet-400">$29 / mo</span>
            <span class="text-gray-400 group-has-[:checked]:text-violet-400/75">($290 / yr)</span>
          </span>
          <span class="ml-6 pl-1 text-sm/5 text-gray-400 group-has-[:checked]:text-violet-400/75 md:ml-0 md:pl-0 md:text-right">Up to 5 active job postings</span>
        </label>
        <label
          aria-label="Business"
          aria-description="$99 per month, $990 per year, Up to 25 active job postings"
          class="group flex flex-col border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none forced:focus:outline-2 forced:focus:outline-offset-2 forced:focus:outline-transparent has-[:checked]:relative has-[:checked]:border-violet-700 has-[:checked]:bg-violet-600/10 md:grid md:grid-cols-3 md:pr-6 md:pl-4">
          <span class="flex items-center gap-3 text-sm/5">
            <input
              type="radio"
              name="pricing-plan"
              value="business"
              class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden" />
            <span class="font-medium text-white group-has-[:checked]:text-violet-400">Business</span>
          </span>
          <span class="ml-6 pl-1 text-sm/5 md:ml-0 md:pl-0 md:text-center">
            <span class="font-medium text-white group-has-[:checked]:text-violet-400">$99 / mo</span>
            <span class="text-gray-400 group-has-[:checked]:text-violet-400/75">($990 / yr)</span>
          </span>
          <span class="ml-6 pl-1 text-sm/5 text-gray-400 group-has-[:checked]:text-violet-400/75 md:ml-0 md:pl-0 md:text-right">Up to 25 active job postings</span>
        </label>
        <label
          aria-label="Enterprise"
          aria-description="$249 per month, $2490 per year, Unlimited active job postings"
          class="group flex flex-col border border-gray-700 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none forced:focus:outline-2 forced:focus:outline-offset-2 forced:focus:outline-transparent has-[:checked]:relative has-[:checked]:border-violet-700 has-[:checked]:bg-violet-600/10 md:grid md:grid-cols-3 md:pr-6 md:pl-4">
          <span class="flex items-center gap-3 text-sm/5">
            <input
              type="radio"
              name="pricing-plan"
              value="enterprise"
              class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:content-[''] before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:before:block checked:border-violet-500 checked:bg-violet-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced:appearance-auto forced:before:hidden" />
            <span class="font-medium text-white group-has-[:checked]:text-violet-400">Enterprise</span>
          </span>
          <span class="ml-6 pl-1 text-sm/5 md:ml-0 md:pl-0 md:text-center">
            <span class="font-medium text-white group-has-[:checked]:text-violet-400">$249 / mo</span>
            <span class="text-gray-400 group-has-[:checked]:text-violet-400/75">($2490 / yr)</span>
          </span>
          <span class="ml-6 pl-1 text-sm/5 text-gray-400 group-has-[:checked]:text-violet-400/75 md:ml-0 md:pl-0 md:text-right">Unlimited active job postings</span>
        </label>
      </fieldset>
    </div>
  </div>
</body>
</html>
