<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="flex justify-center bg-white px-8 py-12">
      <div class="mx-auto w-full max-w-3xl">
        <fieldset aria-label="Privacy setting" class="-space-y-px rounded-md bg-white">
          <label aria-label="Public access" aria-description="This project would be available to anyone who has the link" class="flex border border-gray-200 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none focus:outline-offset-2 has-[:checked]:relative has-[:checked]:border-indigo-200 has-[:checked]:bg-indigo-50 group">
            <input type="radio" name="privacy-setting" value="public" checked class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 ulj appearance-auto umj" />
            <span class="ml-3 flex flex-col">
              <span class="block text-sm font-medium text-gray-900 group-has-[:checked]:text-indigo-900">Public access</span>
              <span class="block text-sm text-gray-500 group-has-[:checked]:text-indigo-700">This project would be available to anyone who has the link</span>
            </span>
          </label>
          <label aria-label="Private to project members" aria-description="Only members of this project would be able to access" class="flex border border-gray-200 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none focus:outline-offset-2 has-[:checked]:relative has-[:checked]:border-indigo-200 has-[:checked]:bg-indigo-50 group">
            <input type="radio" name="privacy-setting" value="private-to-project-members" class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 ulj appearance-auto umj" />
            <span class="ml-3 flex flex-col">
              <span class="block text-sm font-medium text-gray-900 group-has-[:checked]:text-indigo-900">Private to project members</span>
              <span class="block text-sm text-gray-500 group-has-[:checked]:text-indigo-700">Only members of this project would be able to access</span>
            </span>
          </label>
          <label aria-label="Private to you" aria-description="You are the only one able to access this project" class="flex border border-gray-200 p-4 first:rounded-tl-md first:rounded-tr-md last:rounded-br-md last:rounded-bl-md focus:outline-none focus:outline-offset-2 has-[:checked]:relative has-[:checked]:border-indigo-200 has-[:checked]:bg-indigo-50 group">
            <input type="radio" name="privacy-setting" value="private-to-you" class="relative mt-0.5 size-4 shrink-0 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 ulj appearance-auto umj" />
            <span class="ml-3 flex flex-col">
              <span class="block text-sm font-medium text-gray-900 group-has-[:checked]:text-indigo-900">Private to you</span>
              <span class="block text-sm text-gray-500 group-has-[:checked]:text-indigo-700">You are the only one able to access this project</span>
            </span>
          </label>
        </fieldset>
      </div>
    </div>
  </body>
</html>
