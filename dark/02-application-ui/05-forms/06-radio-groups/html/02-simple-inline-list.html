<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex justify-center bg-gray-900 px-8 py-12 scheme-dark">
      <fieldset>
        <legend class="text-sm leading-6 font-semibold text-white">Notifications</legend>
        <p class="mt-1 text-sm leading-6 text-gray-400">How do you prefer to receive notifications?</p>
        <div class="mt-6 space-y-6 sm:flex sm:items-center sm:space-y-0 sm:space-x-10">
          <div class="flex items-center">
            <input id="email" type="radio" name="notification-method" checked class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            <label for="email" class="ml-3 block text-sm leading-6 font-medium text-white">Email</label>
          </div>
          <div class="flex items-center">
            <input id="sms" type="radio" name="notification-method" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            <label for="sms" class="ml-3 block text-sm leading-6 font-medium text-white">Phone (SMS)</label>
          </div>
          <div class="flex items-center">
            <input id="push" type="radio" name="notification-method" class="relative size-4 appearance-none rounded-full border border-white/10 bg-white/5 before:absolute before:inset-1 before:rounded-full before:bg-white before:hidden checked:border-indigo-500 checked:bg-indigo-500 checked:before:block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:before:bg-white/20 forced-colors:appearance-auto forced-colors:before:hidden" />
            <label for="push" class="ml-3 block text-sm leading-6 font-medium text-white">Push notification</label>
          </div>
        </div>
      </fieldset>
    </div>
  </body>
</html>
