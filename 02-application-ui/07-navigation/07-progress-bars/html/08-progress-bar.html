<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    --font-sans: InterVariable, system-ui, sans-serif;
    --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  }
</style>
<body class="antialiased bg-gray-900">
  <div class="bg-gray-900 px-4 py-12 [color-scheme:dark] md:px-6 xl:px-8">
    <div>
      <h4 class="sr-only">Status</h4>
      <p class="text-sm font-medium text-white">Migrating MySQL database...</p>
      <div aria-hidden="true" class="mt-6">
        <div class="overflow-hidden rounded-full bg-white/10">
          <div style="width: 37.5%" class="h-2 rounded-full bg-indigo-500"></div>
        </div>
        <div class="mt-6 hidden grid-cols-4 text-sm font-medium text-gray-400 md:grid">
          <div class="text-indigo-400">Copying files</div>
          <div class="text-center text-indigo-400">Migrating database</div>
          <div class="text-center">Compiling assets</div>
          <div class="text-right">Deployed</div>
        </div>
      </div>
    </div>
  </div>
  <script></script>
</body>
