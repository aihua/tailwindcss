<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
  <div class="bg-gray-900 scheme-dark px-4 py-6 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-7xl">
      <div>
        <div class="grid grid-cols-1 sm:hidden">
          <!-- Use an "onChange" listener to redirect the user to the selected tab URL. -->
          <select aria-label="Select a tab" class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-white/5 py-2 pr-8 pl-3 text-base text-gray-100 outline-1 -outline-offset-1 outline-white/10 [&>*]:bg-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500">
            <option>My Account</option>
            <option>Company</option>
            <option selected>Team Members</option>
            <option>Billing</option>
          </select>
          <svg viewBox="0 0 16 16" fill="currentColor" data-slot="icon" aria-hidden="true" class="pointer-events-none col-start-1 row-start-1 mr-2 h-5 w-5 self-center justify-self-end fill-gray-400">
            <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
          </svg>
        </div>
        <div class="hidden sm:block">
          <div class="border-b border-white/10">
            <nav aria-label="Tabs" class="-mb-px flex">
              <!-- Current: "border-indigo-400 text-indigo-400", Default: "border-transparent text-gray-400 hover:border-white/20 hover:text-gray-300" -->
              <a href="#" class="w-1/4 border-b-2 border-transparent px-1 py-4 text-center text-sm font-medium text-gray-400 hover:border-white/20 hover:text-gray-300">My Account</a>
              <a href="#" class="w-1/4 border-b-2 border-transparent px-1 py-4 text-center text-sm font-medium text-gray-400 hover:border-white/20 hover:text-gray-300">Company</a>
              <a href="#" aria-current="page" class="w-1/4 border-b-2 border-indigo-400 px-1 py-4 text-center text-sm font-medium text-indigo-400">Team Members</a>
              <a href="#" class="w-1/4 border-b-2 border-transparent px-1 py-4 text-center text-sm font-medium text-gray-400 hover:border-white/20 hover:text-gray-300">Billing</a>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>
  </body>
</html>
