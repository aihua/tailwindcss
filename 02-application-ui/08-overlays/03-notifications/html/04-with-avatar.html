<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
<body class="bg-gray-900 antialiased"><div style="min-height: 320px" class="bg-gray-900 scheme-dark">
  <!-- Global notification live region, render this permanently at the end of the document -->
  <div aria-live="assertive" class="pointer-events-none fixed inset-0 flex items-end px-4 py-6 sm:items-start sm:p-6">
    <div class="flex w-full flex-col items-center space-y-4 sm:items-end">
      <!-- Notification panel, dynamically insert this into the live region when it needs to be displayed -->
      <div class="pointer-events-auto flex w-full max-w-md translate-y-0 transform rounded-lg bg-gray-800 opacity-100 shadow-lg outline -outline-offset-1 outline-white/10 transition duration-300 ease-in sm:translate-x-0 vcc vcd vce vcf">
        <div class="w-0 flex-1 p-4">
          <div class="flex items-start">
            <div class="shrink-0 pt-0.5">
              <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2.2&w=160&h=160&q=80" alt="" class="size-10 rounded-full bg-gray-800 outline -outline-offset-1 outline-white/10" />
            </div>
            <div class="ml-3 w-0 flex-1">
              <p class="text-sm font-medium text-white">Emilia Gates</p>
              <p class="mt-1 text-sm text-gray-400">Sure! 8:30pm works great!</p>
            </div>
          </div>
        </div>
        <div class="flex border-l-1 border-white/10">
          <button type="button" class="flex w-full items-center justify-center rounded-none rounded-r-lg p-4 text-sm font-medium text-indigo-400 hover:text-indigo-300 focus:outline-2 focus:outline-indigo-400">Reply</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script></script>
</body>
</html>
