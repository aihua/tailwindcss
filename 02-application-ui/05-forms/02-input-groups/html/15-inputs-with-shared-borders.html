<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="flex items-center justify-center bg-gray-900 p-8 dark">
    <div class="mx-auto w-full max-w-xs">
      <div>
        <fieldset>
          <legend class="block text-sm font-medium text-white">Card details</legend>
          <div class="mt-2 grid grid-cols-2">
            <div class="col-span-2">
              <input id="card-number" type="text" name="card-number" placeholder="Card number" aria-label="Card number" class="block w-full rounded-t-lg bg-white/5 px-3 py-1.5 text-base text-white outline outline-solid -outline-offset-1 outline-gray-700 placeholder-gray-500 focus:relative focus:outline-2 focus:outline-solid focus:-outline-offset-2 focus:outline-violet-400 sm:text-sm" />
            </div>
            <div class="-mt-px -mr-px">
              <input id="card-expiration-date" type="text" name="card-expiration-date" placeholder="MM / YY" aria-label="Expiration date" class="block w-full rounded-bl bg-white/5 px-3 py-1.5 text-base text-white outline outline-solid -outline-offset-1 outline-gray-700 placeholder-gray-500 focus:relative focus:outline-2 focus:outline-solid focus:-outline-offset-2 focus:outline-violet-400 sm:text-sm" />
            </div>
            <div class="-mt-px">
              <input id="card-cvc" type="text" name="card-cvc" placeholder="CVC" aria-label="CVC" class="block w-full rounded-br bg-white/5 px-3 py-1.5 text-base text-white outline outline-solid -outline-offset-1 outline-gray-700 placeholder-gray-500 focus:relative focus:outline-2 focus:outline-solid focus:-outline-offset-2 focus:outline-violet-400 sm:text-sm" />
            </div>
          </div>
        </fieldset>
        <fieldset class="mt-6">
          <legend class="block text-sm font-medium text-white">Billing address</legend>
          <div class="mt-2">
            <div class="grid grid-cols-1 focus-within:relative">
              <select id="country" name="country" autocomplete="country-name" aria-label="Country" class="col-start-1 row-start-1 block w-full appearance-none rounded-t-lg bg-white/5 py-1.5 pr-8 pl-3 text-base text-white outline outline-solid -outline-offset-1 outline-gray-700 placeholder-gray-500 focus:outline-2 focus:outline-solid focus:-outline-offset-2 focus:outline-violet-400 sm:text-sm [&>*]:bg-gray-700">
                <option>United States</option>
                <option>Canada</option>
                <option>Mexico</option>
              </select>
              <svg viewBox="0 0 16 16" fill="currentColor" data-slot="icon" aria-hidden="true" class="pointer-events-none col-start-1 row-start-1 mr-2 w-5 h-5 self-center justify-self-end text-gray-400 sm:w-4 sm:h-4">
                <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
              </svg>
            </div>
            <div class="-mt-px">
              <input id="postal-code" type="text" name="postal-code" placeholder="ZIP / Postal code" autocomplete="postal-code" aria-label="ZIP / Postal code" class="block w-full rounded-br-lg bg-white/5 px-3 py-1.5 text-base text-white outline outline-solid -outline-offset-1 outline-gray-700 placeholder-gray-500 focus:relative focus:outline-2 focus:outline-solid focus:-outline-offset-2 focus:outline-violet-400 sm:text-sm" />
            </div>
          </div>
        </fieldset>
      </div>
    </div>
  </div>
  <script></script>
</body>
</html>
