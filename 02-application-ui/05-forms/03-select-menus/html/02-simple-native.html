  name="viewport"

  href="https://rsms.me/" /><link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
@theme {
  --font-sans: InterVariable, system-ui, sans-serif;
  --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
}
</style>
<style>
/* Native select option styling */
  select > option {
    background-color: oklch(27.8% 0.033 256.848);
  }
  @media (prefers-color-scheme: dark) {
    select > option {
      background-color: oklch(27.8% 0.033 256.848);
    }
  }
</style>






<body class="antialiased bg-gray-900">
  <div class="flex items-center justify-center bg-gray-900 p-8 dark">
    <div class="mx-auto w-full max-w-80">
      <label for="location" class="block text-sm leading-6 font-medium text-white">Location</label>
      <div class="mt-2 grid grid-cols-1">
        <select
          id="location"
          name="location"
          class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-white/5 py-1.5 pr-8 pl-3 text-base text-white outline-1 -outline-offset-1 outline-white/10 select-option-bg focus-visible:outline-2 focus-visible:-outline-offset-2 focus-visible:outline-violet-500 sm:text-sm sm:leading-6">
          <option>United States</option>
          <option selected>Canada</option>
          <option>Mexico</option>
        </select>
        <svg
          viewBox="0 0 16 16"
          fill="currentColor"
          data-slot="icon"
          aria-hidden="true"
          class="pointer-events-none col-start-1 row-start-1 mr-2 w-5 h-5 self-center justify-self-end text-violet-400 sm:w-4 sm:h-4">
          <path
            d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"
            fill-rule="evenodd" />
        </svg>
      </div>
    </div>
  </div>
  <script></script>
</body>
