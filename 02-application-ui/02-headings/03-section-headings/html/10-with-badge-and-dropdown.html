<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="min-h-75 sm:min-h-60 bg-gray-900 [color-scheme:dark]">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-12">
      <div class="border-b border-white/10 pb-5">
        <div class="sm:flex sm:items-baseline sm:justify-between">
          <div class="sm:w-0 sm:flex-1">
            <h1 id="message-heading" class="text-base font-semibold text-white">Full-Stack Developer</h1>
            <p class="mt-1 truncate text-sm text-gray-400">Checkout and Payments Team</p>
          </div>

          <div class="mt-4 flex items-center justify-between sm:mt-0 sm:ml-6 sm:shrink-0 sm:justify-start">
            <span class="inline-flex items-center rounded-full bg-green-500/10 px-2 py-1 text-xs font-medium text-green-400 ring-1 ring-green-500/10">Open</span>
            <div class="-my-2 ml-3 inline-block text-left">
              <el-dropdown class="relative">
                <button class="flex items-center rounded-full p-2 text-gray-400 hover:text-gray-300 focus-visible:outline-2 focus-visible:outline-indigo-500">
                  <span class="sr-only">Open options</span>
                  <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="size-5">
                    <path d="M10 3a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM10 8.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM11.5 15.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0Z" />
                  </svg>
                </button>

                <el-menu
                  anchor="bottom end"
                  popover
                  class="w-56 origin-top-right rounded-md bg-gray-800 outline outline-offset-[-1px] outline-white/10 transition-all duration-150 transition-discrete anchor-gap-2 [data-closed]:scale-95 [data-closed]:opacity-0 [data-enter]:duration-100 [data-enter]:ease-[cubic-bezier(0,0,0.2,1)] [data-leave]:duration-75 [data-leave]:ease-[cubic-bezier(0.4,0,1,1)]"
                >
                  <div class="py-1">
                    <a href="#" class="flex justify-between px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-none">
                      <span>Edit</span>
                    </a>
                    <a href="#" class="flex justify-between px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-none">
                      <span>Duplicate</span>
                    </a>
                    <button type="button" class="flex w-full justify-between px-4 py-2 text-sm text-gray-300 focus:bg-white/5 focus:text-white focus:outline-none">
                      <span>Archive</span>
                    </button>
                  </div>
                </el-menu>
              </el-dropdown>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
