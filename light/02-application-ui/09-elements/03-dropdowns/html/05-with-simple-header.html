<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div style="min-height: 360px" class="bg-gray-100 p-8">
  <div class="mx-auto flex w-64 justify-end">
    <el-dropdown data-default-open class="inline-block">
      <button class="inline-flex w-full justify-center gap-x-1.5 rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring-1 inset-ring-gray-300 hover:bg-gray-50">
        Options
        <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="-mr-1 size-5 text-gray-400">
          <path d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
        </svg>
      </button>

      <el-menu anchor="bottom end" popover class="w-56 origin-top-right divide-y divide-gray-100 rounded-md bg-white shadow-lg outline-1 outline-[oklab(0%_none_none/.05)] transition transition-discrete [--anchor-gap:calc(.25rem*2)] data-[closed]:scale-95 data-[closed]:transform data-[closed]:opacity-0 data-[enter]:duration-100 data-[enter]:ease-out data-[leave]:duration-75 data-[leave]:ease-in">
        <div class="px-4 py-3">
          <p class="text-sm text-gray-700">Signed in as</p>
          <p class="truncate text-sm font-medium text-gray-900">tom@example.com</p>
        </div>
        <div class="py-1">
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 focus:bg-gray-100 focus:text-gray-900 focus:outline-none">Account settings</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 focus:bg-gray-100 focus:text-gray-900 focus:outline-none">Support</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 focus:bg-gray-100 focus:text-gray-900 focus:outline-none">License</a>
        </div>
        <div class="py-1">
          <form action="#" method="POST">
            <button type="submit" class="block w-full px-4 py-2 text-left text-sm text-gray-700 focus:bg-gray-100 focus:text-gray-900 focus:outline-none">Sign out</button>
          </form>
        </div>
      </el-menu>
    </el-dropdown>
  </div>
</div>
<script>
  {
    function onReady() {
      let menus = document.querySelectorAll('el-dropdown[data-default-open] el-menu')
      menus.forEach((menu) => {
        // Ignore next scrollIntoView call
        let originalScrollIntoView = Element.prototype.scrollIntoView
        Element.prototype.scrollIntoView = () => {
          Element.prototype.scrollIntoView = originalScrollIntoView
        }
        menu.showPopover()
      })
    }
    if (customElements.get('el-dropdown')) {
      onReady()
    } else {
      window.addEventListener('elements:ready', onReady)
    }
  }
</script>
  </body>
</html>
