<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-white antialiased">
<div class="flex items-center justify-center bg-white p-8">
  <div class="mx-auto w-full max-w-[20rem]">
    <div class="-space-y-px">
      <div class="rounded-tl-md rounded-tr-md bg-white px-3 pt-2.5 pb-1.5 outline-1 outline-offset-[-1px] outline-gray-300 focus-within:relative focus-within:outline-2 focus-within:outline-offset-[-2px] focus-within:outline-indigo-600">
        <label for="name" class="block text-xs/4 font-medium text-gray-900">Name</label>
        <input id="name" type="text" name="name" placeholder="Jane Smith" class="block w-full text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
      </div>
      <div class="rounded-bl-md rounded-br-md bg-white px-3 pt-2.5 pb-1.5 outline-1 outline-offset-[-1px] outline-gray-300 focus-within:relative focus-within:outline-2 focus-within:outline-offset-[-2px] focus-within:outline-indigo-600">
        <label for="job-title" class="block text-xs/4 font-medium text-gray-900">Job title</label>
        <input id="job-title" type="text" name="job-title" placeholder="Head of Tomfoolery" class="block w-full text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
      </div>
    </div>
  </div>
</div>
<script></script>

  </body>
</html>
