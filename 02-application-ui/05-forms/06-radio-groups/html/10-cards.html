<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: InterVariable, system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      --color-panel: oklab(27.8% -0.00750866 -0.0321344 / 0.5);
    }
  </style>
</head>
<body class="bg-gray-900 antialiased">
  <div class="flex justify-center bg-gray-900 px-8 py-12 dark">
    <fieldset>
      <legend class="text-sm/6 font-semibold text-white">Select a mailing list</legend>
      <div class="mt-6 grid grid-cols-1 gap-y-6 sm:grid-cols-3 sm:gap-x-4">
        <label
          aria-label="Newsletter"
          aria-description="Last message sent an hour ago to 621 users"
          class="group relative flex rounded-lg border border-white/10 bg-panel p-4 has-[:checked]:bg-violet-500/10 has-[:checked]:outline-2 has-[:checked]:-outline-offset-2 has-[:checked]:outline-violet-500 has-[:focus-visible]:outline-3 has-[:focus-visible]:-outline-offset-1 has-[:disabled]:opacity-25 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)]">
          <input type="radio" name="mailing-list" value="newsletter" checked class="absolute inset-0 appearance-none focus:outline-none" />
          <div class="flex-1">
            <span class="block text-sm/5 font-medium text-white">Newsletter</span>
            <span class="mt-1 block text-sm/5 text-gray-400">Last message sent an hour ago</span>
            <span class="mt-6 block text-sm/5 font-medium text-white">621 users</span>
          </div>
          <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="invisible size-5 text-violet-500 group-has-[:checked]:visible">
            <path
              d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
              clip-rule="evenodd"
              fill-rule="evenodd" />
          </svg>
        </label>
        <label
          aria-label="Existing customers"
          aria-description="Last message sent 2 weeks ago to 1200 users"
          class="group relative flex rounded-lg border border-white/10 bg-panel p-4 has-[:checked]:bg-violet-500/10 has-[:checked]:outline-2 has-[:checked]:-outline-offset-2 has-[:checked]:outline-violet-500 has-[:focus-visible]:outline-3 has-[:focus-visible]:-outline-offset-1 has-[:disabled]:opacity-25 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)]">
          <input type="radio" name="mailing-list" value="existing-customers" class="absolute inset-0 appearance-none focus:outline-none" />
          <div class="flex-1">
            <span class="block text-sm/5 font-medium text-white">Existing customers</span>
            <span class="mt-1 block text-sm/5 text-gray-400">Last message sent 2 weeks ago</span>
            <span class="mt-6 block text-sm/5 font-medium text-white">1200 users</span>
          </div>
          <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="invisible size-5 text-violet-500 group-has-[:checked]:visible">
            <path
              d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
              clip-rule="evenodd"
              fill-rule="evenodd" />
          </svg>
        </label>
        <label
          aria-label="Trial users"
          aria-description="Last message sent 4 days ago to 2740 users"
          class="group relative flex rounded-lg border border-white/10 bg-panel p-4 has-[:checked]:bg-violet-500/10 has-[:checked]:outline-2 has-[:checked]:-outline-offset-2 has-[:checked]:outline-violet-500 has-[:focus-visible]:outline-3 has-[:focus-visible]:-outline-offset-1 has-[:disabled]:opacity-25 has-[:disabled]:bg-[oklch(27.8%_0.033_256.848)]">
          <input type="radio" name="mailing-list" value="trial-users" class="absolute inset-0 appearance-none focus:outline-none" />
          <div class="flex-1">
            <span class="block text-sm/5 font-medium text-white">Trial users</span>
            <span class="mt-1 block text-sm/5 text-gray-400">Last message sent 4 days ago</span>
            <span class="mt-6 block text-sm/5 font-medium text-white">2740 users</span>
          </div>
          <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="invisible size-5 text-violet-500 group-has-[:checked]:visible">
            <path
              d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
              clip-rule="evenodd"
              fill-rule="evenodd" />
          </svg>
        </label>
      </div>
    </fieldset>
  </div>
</body>
</html>
