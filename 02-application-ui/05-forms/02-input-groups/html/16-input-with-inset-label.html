<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex items-center justify-center bg-gray-900 p-8 [color-scheme:dark]">
      <div class="mx-auto w-full max-w-xs">
        <div class="rounded-md bg-white/5 px-3 pt-2.5 pb-1.5 outline-1 -outline-offset-1 outline-white/10 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-indigo-500">
          <label for="name" class="block text-xs font-medium text-gray-200">Name</label>
          <input id="name" type="text" name="name" placeholder="Jane Smith" class="block w-full bg-transparent text-white placeholder-gray-500 focus:outline-none sm:text-sm/6" />
        </div>
      </div>
    </div>
    <script></script>
  </body>
</html>
