<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
  <style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: oklch(21% 0.034 264.665);
    }
    el-popover:is([open], :popover-open, :open) {
      display: flex;
    }
    el-popover::backdrop {
      background-color: transparent;
    }
  </style>
</head>
<body>
  <div class="min-h-[388px] bg-[oklch(21%_0.034_264.665)] dark">
    <div class="flex items-center justify-center p-8">
      <div class="relative">
        <button popovertarget="desktop-menu-solutions" class="inline-flex items-center gap-x-1 text-sm/6 font-semibold text-white">
          <span>Solutions</span>
          <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="w-5 h-5">
            <path d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
          </svg>
        </button>

        <el-popover
          id="desktop-menu-solutions"
          anchor="bottom"
          popover
          data-default-open
          class="w-screen max-w-min overflow-visible bg-transparent px-4 transition-all [transition-behavior:allow-discrete] [--anchor-gap:1.25rem] data-[closed]:translate-y-1 data-[closed]:opacity-0 data-[enter]:duration-200 data-[enter]:ease-out data-[leave]:duration-150 data-[leave]:ease-in">
          <div class="w-56 shrink rounded-xl bg-[oklch(27.8%_0.033_256.848)] p-4 text-sm/6 font-semibold text-white outline outline-1 [outline-offset:-1px] [outline-color:oklab(100%_0_5.96046e-8/0.1)]">
            <a href="#" class="block p-2 hover:text-[oklch(67.3%_0.182_276.935)]">Analytics</a>
            <a href="#" class="block p-2 hover:text-[oklch(67.3%_0.182_276.935)]">Engagement</a>
            <a href="#" class="block p-2 hover:text-[oklch(67.3%_0.182_276.935)]">Security</a>
            <a href="#" class="block p-2 hover:text-[oklch(67.3%_0.182_276.935)]">Integrations</a>
            <a href="#" class="block p-2 hover:text-[oklch(67.3%_0.182_276.935)]">Automations</a>
            <a href="#" class="block p-2 hover:text-[oklch(67.3%_0.182_276.935)]">Reports</a>
          </div>
        </el-popover>
      </div>
    </div>
  </div>
  <script>
    {
      let popovers = document.querySelectorAll('el-popover[data-default-open]');
      if (customElements.get('el-popover')) {
        popovers.forEach(popover => popover.showPopover());
      } else {
        window.addEventListener('elements:ready', () => popovers.forEach(popover => popover.showPopover()));
      }
    }
  </script>
</body>
</html>
