<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div class="bg-gray-100">
  <div class="mx-auto max-w-[80rem] py-12 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-[48rem]">
      <div class="bg-white shadow-sm sm:rounded-[.5rem]">
        <div class="px-4 py-5 sm:p-6">
          <h3 class="text-base font-semibold text-gray-900">Update your email</h3>
          <div class="mt-2 max-w-[36rem] text-sm text-gray-500">
            <p>Change the email address you want associated with your account.</p>
          </div>
          <form class="mt-5 sm:flex sm:items-center">
            <div class="w-full sm:max-w-80">
              <input id="email" type="email" name="email" placeholder="you@example.com" aria-label="Email" class="block w-full rounded-[.375rem] bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm sm:leading-6" />
            </div>
            <button type="submit" class="mt-3 inline-flex w-full items-center justify-center rounded-[.375rem] bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-[0_1px_2px_0_#0000000d] hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 sm:mt-0 sm:ml-3 sm:w-auto">Save</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script></script>
  </body>
</html>
