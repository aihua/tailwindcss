<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="bg-gray-900" style="color-scheme: dark">
    <div class="flex items-center justify-center p-8">
      <div class="relative">
        <button popovertarget="desktop-menu-solutions" class="inline-flex items-center gap-x-1 text-sm/6 font-semibold text-white">
          <span>Solutions</span>
          <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="size-5">
            <path
              d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
              clip-rule="evenodd"
              fill-rule="evenodd" />
          </svg>
        </button>

        <el-popover
          id="desktop-menu-solutions"
          anchor="bottom"
          popover
          class="w-screen max-w-min overflow-visible bg-transparent px-4 transition transition-discrete [--anchor-gap:--spacing(5)] open:flex data-[closed]:translate-y-1 data-[closed]:opacity-0 data-[enter]:duration-200 data-[enter]:ease-out data-[leave]:duration-150 data-[leave]:ease-in">
          <div class="w-56 shrink rounded-xl bg-gray-800 p-4 text-sm/6 font-semibold text-white outline outline-1 outline-white/10 -outline-offset-1">
            <a href="#" class="block p-2 hover:text-indigo-400">Analytics</a>
            <a href="#" class="block p-2 hover:text-indigo-400">Engagement</a>
            <a href="#" class="block p-2 hover:text-indigo-400">Security</a>
            <a href="#" class="block p-2 hover:text-indigo-400">Integrations</a>
            <a href="#" class="block p-2 hover:text-indigo-400">Automations</a>
            <a href="#" class="block p-2 hover:text-indigo-400">Reports</a>
          </div>
        </el-popover>
      </div>
    </div>
  </div>
  <script>
    {
      let popovers = document.querySelectorAll('el-popover[data-default-open]');
      if (customElements.get('el-popover')) {
        popovers.forEach(popover => popover.showPopover());
      } else {
        window.addEventListener('elements:ready', () => popovers.forEach(popover => popover.showPopover()));
      }
    }
  </script>
</body>
</html>
