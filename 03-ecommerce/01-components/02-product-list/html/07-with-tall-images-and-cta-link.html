<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-white">
  <div class="bg-white">
    <div class="mx-auto max-w-[80rem] px-4 py-16 sm:px-6 sm:py-24 lg:px-8">
      <div class="flex items-baseline justify-between">
        <h2 class="text-2xl font-bold tracking-tight text-gray-900">Our Favorites</h2>
        <a href="#" class="hidden text-sm font-semibold text-violet-600 hover:text-violet-500 sm:block">
          Browse all favorites
          <span aria-hidden="true"> &rarr;</span>
        </a>
      </div>

      <div class="mt-6 grid grid-cols-1 gap-10 sm:grid-cols-3 sm:gap-6 sm:gap-0 lg:gap-8">
        <div class="group relative">
          <img
            src="https://tailwindui.com/plus-assets/img/ecommerce-images/home-page-03-favorite-01.jpg"
            alt="Model wearing women's black cotton crewneck tee."
            class="h-96 w-full rounded-lg object-cover group-hover:opacity-75 sm:aspect-[2/3] sm:h-auto" />
          <h3 class="mt-4 text-base font-semibold text-gray-900">
            <a href="#">
              <span class="absolute inset-0"></span>
              Black Basic Tee
            </a>
          </h3>
          <p class="mt-1 text-sm text-gray-500">$32</p>
        </div>

        <div class="group relative">
          <img
            src="https://tailwindui.com/plus-assets/img/ecommerce-images/home-page-03-favorite-02.jpg"
            alt="Model wearing women's off-white cotton crewneck tee."
            class="h-96 w-full rounded-lg object-cover group-hover:opacity-75 sm:aspect-[2/3] sm:h-auto" />
          <h3 class="mt-4 text-base font-semibold text-gray-900">
            <a href="#">
              <span class="absolute inset-0"></span>
              Off-White Basic Tee
            </a>
          </h3>
          <p class="mt-1 text-sm text-gray-500">$32</p>
        </div>

        <div class="group relative">
          <img
            src="https://tailwindui.com/plus-assets/img/ecommerce-images/home-page-03-favorite-03.jpg"
            alt="Model wearing women's burgundy red crewneck artwork tee."
            class="h-96 w-full rounded-lg object-cover group-hover:opacity-75 sm:aspect-[2/3] sm:h-auto" />
          <h3 class="mt-4 text-base font-semibold text-gray-900">
            <a href="#">
              <span class="absolute inset-0"></span>
              Mountains Artwork Tee
            </a>
          </h3>
          <p class="mt-1 text-sm text-gray-500">$36</p>
        </div>
      </div>

      <div class="mt-6 sm:hidden">
        <a href="#" class="block text-sm font-semibold text-violet-600 hover:text-violet-500">
          Browse all favorites
          <span aria-hidden="true"> &rarr;</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
