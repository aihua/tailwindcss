<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";

  <body class="bg-gray-900 antialiased">
<div class="bg-gray-900 scheme-dark">
  <div class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
    <div>
      <h3 class="text-base font-semibold text-white">Last 30 days</h3>

        </div>
        <div class="overflow-hidden rounded-lg bg-gray-800/75 px-4 py-5 shadow-sm inset-ring-1 inset-ring-white/10 sm:p-6">

          <dd class="mt-1 text-3xl leading-9 font-semibold tracking-tight text-white">58.16%</dd>
        </div>
        <div class="overflow-hidden rounded-lg bg-gray-800/75 px-4 py-5 shadow-sm inset-ring-1 inset-ring-white/10 sm:p-6">
          <dt class="truncate text-sm font-medium text-gray-400">Avg. Click Rate</dt>

</div>
