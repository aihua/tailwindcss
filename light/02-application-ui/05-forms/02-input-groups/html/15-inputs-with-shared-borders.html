<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-white antialiased">
<div class="flex items-center justify-center bg-white p-8">
  <div class="mx-auto w-full max-w-[20rem]">
    <div>
      <fieldset>
        <legend class="block text-sm/6 font-medium text-gray-900">Card details</legend>
        <div class="mt-2 grid grid-cols-2">
          <div class="col-span-2">
            <input id="card-number" type="text" name="card-number" placeholder="Card number" aria-label="Card number" class="block w-full rounded-tl-md rounded-tr-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 outline-offset-[-1px] outline-gray-300 placeholder:text-gray-400 focus:relative focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-600 sm:text-sm/6" />
          </div>
          <div class="-mt-px -mr-px">
            <input id="card-expiration-date" type="text" name="card-expiration-date" placeholder="MM / YY" aria-label="Expiration date" class="block w-full rounded-bl-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 outline-offset-[-1px] outline-gray-300 placeholder:text-gray-400 focus:relative focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-600 sm:text-sm/6" />
          </div>
          <div class="-mt-px">
            <input id="card-cvc" type="text" name="card-cvc" placeholder="CVC" aria-label="CVC" class="block w-full rounded-br-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 outline-offset-[-1px] outline-gray-300 placeholder:text-gray-400 focus:relative focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-600 sm:text-sm/6" />
          </div>
        </div>
      </fieldset>
      <fieldset class="mt-6">
        <legend class="block text-sm/6 font-medium text-gray-900">Billing address</legend>
        <div class="mt-2">
          <div class="grid grid-cols-1 focus-within:relative">
            <select id="country" name="country" autocomplete="country-name" aria-label="Country" class="col-start-1 row-start-1 w-full appearance-none rounded-tl-md rounded-tr-md bg-white py-1.5 pr-8 pl-3 text-base text-gray-900 outline-1 outline-offset-[-1px] outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-600 sm:text-sm/6">
              <option>United States</option>
              <option>Canada</option>
              <option>Mexico</option>
            </select>
            <svg viewBox="0 0 16 16" fill="currentColor" data-slot="icon" aria-hidden="true" class="pointer-events-none col-start-1 row-start-1 mr-2 h-5 w-5 self-center justify-self-end text-gray-500 sm:h-4 sm:w-4">
              <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
            </svg>
          </div>
          <div class="-mt-px">
            <input id="postal-code" type="text" name="postal-code" placeholder="ZIP / Postal code" autocomplete="postal-code" aria-label="ZIP / Postal code" class="block w-full rounded-bl-md rounded-br-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 outline-offset-[-1px] outline-gray-300 placeholder:text-gray-400 focus:relative focus:outline-2 focus:outline-offset-[-2px] focus:outline-indigo-600 sm:text-sm/6" />
          </div>
        </div>
      </fieldset>
    </div>
  </div>
</div>
<script></script>

  </body>
</html>
