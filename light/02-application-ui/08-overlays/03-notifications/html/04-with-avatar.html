<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
<div style="min-height: 320px" class="bg-gray-100">
  <!-- Global notification live region, render this permanently at the end of the document -->
  <div aria-live="assertive" class="pointer-events-none fixed inset-0 flex items-end px-4 py-6 sm:items-start sm:p-6">
    <div class="flex w-full flex-col items-center space-y-4 sm:items-end">
      <!-- Notification panel, dynamically insert this into the live region when it needs to be displayed -->
      <div class="pointer-events-auto flex w-full max-w-[28rem] translate-y-0 rounded-[.5rem] bg-white opacity-100 shadow-lg outline-1 outline-[oklab(0%_none_none/.05)] transition-color,background-color,border-color,outline-color,text-decoration-color,fill,stroke,--tw-gradient-from,--tw-gradient-via,--tw-gradient-to,opacity,box-shadow,transform,translate,scale,rotate,filter,-webkit-backdrop-filter,backdrop-filter,display,content-visibility,overlay,pointer-events sm:translate-x-0">
        <div class="w-0 flex-1 p-4">
          <div class="flex items-start">
            <div class="shrink-[0] pt-0.5">
              <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2.2&w=160&h=160&q=80" alt="" class="w-10 h-10 rounded-[3.40282e38px] bg-gray-100 outline-1 -outline-offset-1 outline-[oklab(0%_none_none/.05)]" />
            </div>
            <div class="ml-3 w-0 flex-1">
              <p class="text-sm font-medium text-gray-900">Emilia Gates</p>
              <p class="mt-1 text-sm text-gray-500">Sure! 8:30pm works great!</p>
            </div>
          </div>
        </div>
        <div class="flex border-l border-gray-200">
          <button type="button" class="flex w-full items-center justify-center rounded-none rounded-tr-[.5rem] rounded-br-[.5rem] p-4 text-sm font-medium text-indigo-600 hover:text-indigo-500 focus:outline-2 focus:outline-indigo-500">Reply</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script></script>
  </body>
</html>
