<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="grid h-125 place-content-center bg-gray-900 scheme-dark">
      <button
        command="show-modal"
        commandfor="dialog"
        class="rounded-md bg-white/10 px-2.5 py-1.5 text-sm font-semibold text-white ring-1 ring-white/5 transition-all duration-300 hover:bg-white/20 [:where(:has(:is([open],:popover-open,:open)))_&]:opacity-0">Open dialog</button>
      <el-dialog>
        <dialog
          id="dialog"
          aria-labelledby="dialog-title"
          class="fixed inset-0 h-auto w-auto max-h-none max-w-none overflow-y-auto bg-transparent [&::backdrop]:bg-transparent">
          <el-dialog-backdrop class="fixed inset-0 bg-gray-900/50 transition-opacity data-[closed]:opacity-0 data-enter:duration-300 data-enter:ease-[cubic-bezier(0,0,0.2,1)] data-leave:duration-200 data-leave:ease-[cubic-bezier(0.4,0,1,1)]"></el-dialog-backdrop>

          <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0">
            <el-dialog-panel class="relative [transform:var(--tw-rotate-x,)_var(--tw-rotate-y,)_var(--tw-rotate-z,)_var(--tw-skew-x,)_var(--tw-skew-y,)] overflow-hidden rounded-lg bg-gray-800 px-4 pt-5 pb-4 text-left shadow-xl outline-1 -outline-offset-1 outline-white/10 transition-all data-[closed]:translate-y-4 data-[closed]:opacity-0 data-enter:duration-300 data-enter:ease-[cubic-bezier(0,0,0.2,1)] data-leave:duration-200 data-leave:ease-[cubic-bezier(0.4,0,1,1)] sm:my-8 sm:w-full sm:max-w-128 sm:p-6 sm:data-[closed]:translate-y-0 sm:data-[closed]:scale-95">
              <div>
                <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-green-500/10">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="h-6 w-6 text-green-400">
                    <path d="m4.5 12.75 6 6 9-13.5" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </div>
                <div class="mt-3 text-center sm:mt-5">
                  <h3 id="dialog-title" class="text-base font-semibold text-white">Payment successful</h3>
                  <div class="mt-2">
                    <p class="text-sm text-gray-400">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Eius aliquam laudantium explicabo pariatur iste dolorem animi vitae error totam. At sapiente aliquam accusamus facere veritatis.</p>
                  </div>
                </div>
              </div>
              <div class="mt-5 sm:mt-6 sm:grid sm:grid-flow-dense sm:grid-cols-2 sm:gap-3">
                <button
                  type="button"
                  command="close"
                  commandfor="dialog"
                  class="inline-flex w-full justify-center rounded-md bg-indigo-500 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 sm:col-start-2">Deactivate</button>
                <button
                  type="button"
                  command="close"
                  commandfor="dialog"
                  class="mt-3 inline-flex w-full justify-center rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white ring-1 ring-white/5 hover:bg-white/20 sm:col-start-1 sm:mt-0">Cancel</button>
              </div>
            </el-dialog-panel>
          </div>
        </dialog>
      </el-dialog>
    </div>
    <script>
      {
        function onReady() {
          for (let elDialog of document.querySelectorAll('el-dialog')) {
            let dialog = elDialog.querySelector('dialog')

            // Mark dialog as inert to prevent focus from moving inside
            dialog.inert = true

            dialog.addEventListener(
              'beforetoggle',
              (evt) => {
                if (evt.newState !== 'open') return

                // Fire normal events for initial value on focus if any
                for (let element of dialog.querySelectorAll('[data-initial-value-on-focus]')) {
                  let value = element.getAttribute('data-initial-value-on-focus')
                  element.removeAttribute('data-initial-value-on-focus')
                  element.value = value
                  element.dispatchEvent(new Event('input'))
                }

                // Then, after all events have been processed, allow focusing
                setTimeout(() => {
                  dialog.inert = false
                }, 0)
              },
              { once: true },
            )

            // Now we can open the dialog
            elDialog.open = true
          }
        }
        if (customElements.get('el-dialog')) {
          onReady()
        } else {
          window.addEventListener('elements:ready', onReady)
        }
      }
    </script>
  </body>
</html>
