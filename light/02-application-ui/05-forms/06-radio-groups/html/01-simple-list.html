<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="flex justify-center bg-white px-8 py-12">
      <fieldset>
        <legend class="text-sm/6 font-semibold text-gray-900">Notifications</legend>
        <p class="mt-1 text-sm/6 text-gray-600">How do you prefer to receive notifications?</p>
        <div class="mt-6 space-y-6">
          <div class="flex items-center">
            <input id="email" type="radio" name="notification-method" checked class="relative size-4 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 poc appearance-auto por" />
            <label for="email" class="ml-3 block text-sm/6 font-medium text-gray-900">Email</label>
          </div>
          <div class="flex items-center">
            <input id="sms" type="radio" name="notification-method" class="relative size-4 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 poc appearance-auto por" />
            <label for="sms" class="ml-3 block text-sm/6 font-medium text-gray-900">Phone (SMS)</label>
          </div>
          <div class="flex items-center">
            <input id="push" type="radio" name="notification-method" class="relative size-4 appearance-none rounded-full border border-gray-300 bg-white before:absolute before:inset-1 before:rounded-full before:bg-white not-checked:before:hidden checked:border-indigo-600 checked:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-gray-300 disabled:bg-gray-100 poc appearance-auto por" />
            <label for="push" class="ml-3 block text-sm/6 font-medium text-gray-900">Push notification</label>
          </div>
        </div>
      </fieldset>
    </div>
  </body>
</html>
