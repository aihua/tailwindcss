<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      }
    </style>
  </head>
  <body class="antialiased bg-gray-900">
    <div class="flex min-h-[840px] flex-col bg-gray-900 dark">
      <div class="flex min-h-full flex-1 items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
        <div class="w-full max-w-sm space-y-10">
          <div>
            <img
              src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
              alt="Your Company"
              class="mx-auto h-10 w-auto"
            />
            <h2 class="mt-10 text-center text-2xl leading-9 font-bold tracking-tight text-white">Sign in to your account</h2>
          </div>

          <form action="#" method="POST" class="space-y-6">
            <div>
              <div class="col-span-2">
                <input
                  id="email-address"
                  type="email"
                  name="email"
                  required
                  placeholder="Email address"
                  autocomplete="email"
                  aria-label="Email address"
                  class="block w-full rounded-t-md bg-white/5 px-3 py-1.5 text-base text-white outline -outline-offset-1 outline-gray-700 placeholder:text-stone-500 focus:relative focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
                />
              </div>
              <div class="-mt-px">
                <input
                  id="password"
                  type="password"
                  name="password"
                  required
                  placeholder="Password"
                  autocomplete="current-password"
                  aria-label="Password"
                  class="block w-full rounded-b-md bg-white/5 px-3 py-1.5 text-base text-white outline -outline-offset-1 outline-gray-700 placeholder:text-stone-500 focus:relative focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
                />
              </div>
            </div>

            <div class="flex items-center justify-between">
              <div class="flex gap-3">
                <div class="flex h-6 shrink-0 items-center">
                  <div class="peer grid w-4 grid-cols-1">
                    <input
                      id="remember-me"
                      type="checkbox"
                      name="remember-me"
                      class="col-start-1 row-start-1 appearance-none rounded-sm border border-white/10 bg-white/5 checked:border-indigo-600 checked:bg-indigo-600 indeterminate:border-indigo-600 indeterminate:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-stone-300 disabled:bg-stone-100 disabled:checked:bg-stone-100 forced-colors:appearance-auto"
                    />
                    <svg viewBox="0 0 14 14" fill="none" class="pointer-events-none col-start-1 row-start-1 w-3.5 self-center justify-self-center stroke-white peer-disabled:stroke-gray-700">
                      <path d="M3 8L6 11L11 3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 peer-checked:opacity-100" />
                      <path d="M3 7H11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 peer-indeterminate:opacity-100" />
                    </svg>
                  </div>
                </div>
                <label for="remember-me" class="block text-sm leading-6 text-stone-300">Remember me</label>
              </div>

              <div class="text-sm leading-6">
                <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
              </div>
            </div>

            <div>
              <button type="submit" class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm leading-6 font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                Sign in
              </button>
            </div>
          </form>

          <p class="text-center text-sm leading-6 text-stone-400">
            Not a member?
            <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Start a 14-day free trial</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
