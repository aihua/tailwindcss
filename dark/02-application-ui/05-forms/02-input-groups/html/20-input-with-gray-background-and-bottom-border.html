<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: InterVariable, system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="bg-gray-900 antialiased">
    <div class="flex items-center justify-center bg-gray-900 p-8 [color-scheme:dark]">
      <div class="mx-auto w-full max-w-xs">
        <div>
          <label for="name" class="block text-sm/6 font-medium text-white">Name</label>
          <div class="relative mt-2">
            <input id="name" type="text" name="name" placeholder="Jane Smith" class="kkf block w-full bg-white/5 px-3 py-1.5 text-white placeholder-gray-500 focus:outline-none sm:text-sm/6" />
            <div aria-hidden="true" class="absolute inset-x-0 bottom-0 border-t border-white/20 [&:is(:where(.kkf):focus~*)]:border-t-2 [&:is(:where(.kkf):focus~*)]:border-indigo-500"></div>
          </div>
        </div>
      </div>
    </div>
    <script></script>
  </body>
</html>
