<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-gray-900">
  <div class="h-0 min-h-[678px] bg-gray-900" style="color-scheme: dark">
    <!--
    This example requires updating your template:

    ```
    <html class="h-full">
    <body class="h-full">
    ```
  -->
    <div class="grid min-h-full grid-cols-1 grid-rows-[1fr_auto_1fr] bg-gray-900 lg:grid-cols-[max(50%,36rem)_1fr]">
      <header class="mx-auto w-full max-w-[80rem] px-6 pt-6 sm:pt-10 lg:col-span-2 lg:col-start-1 lg:row-start-1 lg:px-8">
        <a href="#">
          <span class="sr-only">Your Company</span>
          <img
            src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
            alt=""
            class="h-10 w-auto sm:h-12" />
        </a>
      </header>
      <main class="mx-auto w-full max-w-[80rem] px-6 py-24 sm:py-32 lg:col-span-2 lg:col-start-1 lg:row-start-2 lg:px-8">
        <div class="max-w-[32rem]">
          <p class="text-base/8 font-semibold text-indigo-400">404</p>
          <h1 class="mt-4 text-5xl font-semibold tracking-tight text-pretty text-white sm:text-6xl">Page not found</h1>
          <p class="mt-6 text-lg font-medium text-pretty text-gray-400 sm:text-xl/8">Sorry, we couldn’t find the page you’re looking for.</p>
          <div class="mt-10">
            <a href="#" class="text-sm/7 font-semibold text-indigo-400"><span aria-hidden="true">&larr;</span> Back to home</a>
          </div>
        </div>
      </main>
      <footer class="self-end lg:col-span-2 lg:col-start-1 lg:row-start-3">
        <div class="border-t border-white/10 bg-gray-800/50 py-10">
          <nav class="mx-auto flex w-full max-w-[80rem] items-center gap-x-4 px-6 text-sm/7 text-gray-400 lg:px-8">
            <a href="#">Contact support</a>
            <svg viewBox="0 0 2 2" aria-hidden="true" class="size-0.5 fill-gray-600">
              <circle r="1" cx="1" cy="1" />
            </svg>
            <a href="#">Status</a>
          </nav>
        </div>
      </footer>
      <div class="hidden w-0.5 h-0.5 lg:block lg:relative lg:col-start-2 lg:row-start-1 lg:row-end-4 lg:w-auto lg:h-auto">
        <img
          src="https://images.unsplash.com/photo-1583585635793-0e1894c169bd?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=1825&q=80"
          alt=""
          class="absolute inset-0 h-full w-full object-cover" />
      </div>
    </div>
  </div>
</body>
</html>
