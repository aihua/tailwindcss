<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "InterVariable", system-ui, sans-serif;
        --font-sans--font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="flex justify-center bg-white px-8 py-12">
      <fieldset aria-label="Choose a memory option">
        <div class="flex items-center justify-between">
          <div class="text-sm/6 font-medium text-gray-900">RAM</div>
          <a href="#" class="text-sm/6 font-medium text-indigo-600 hover:text-indigo-500">See performance specs</a>
        </div>
        <div class="mt-2 grid grid-cols-3 gap-3 sm:grid-cols-6">
          <label aria-label="4 GB" class="relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25 group">
            <input type="radio" name="option" value="4gb" class="absolute inset-0 appearance-none focus:outline-none opw" />
            <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">4 GB</span>
          </label>
          <label aria-label="8 GB" class="relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25 group">
            <input type="radio" name="option" value="8gb" class="absolute inset-0 appearance-none focus:outline-none opw" />
            <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">8 GB</span>
          </label>
          <label aria-label="16 GB" class="relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25 group">
            <input type="radio" name="option" value="16gb" checked class="absolute inset-0 appearance-none focus:outline-none opw" />
            <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">16 GB</span>
          </label>
          <label aria-label="32 GB" class="relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25 group">
            <input type="radio" name="option" value="32gb" class="absolute inset-0 appearance-none focus:outline-none opw" />
            <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">32 GB</span>
          </label>
          <label aria-label="64 GB" class="relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25 group">
            <input type="radio" name="option" value="64gb" class="absolute inset-0 appearance-none focus:outline-none opw" />
            <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">64 GB</span>
          </label>
          <label aria-label="128 GB" class="relative flex items-center justify-center rounded-md border border-gray-300 bg-white p-3 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-600 has-[:focus-visible]:outline-2 has-[:focus-visible]:outline-offset-2 has-[:focus-visible]:outline-indigo-600 has-[:disabled]:border-gray-400 has-[:disabled]:bg-gray-200 has-[:disabled]:opacity-25 group">
            <input type="radio" name="option" value="128gb" disabled class="absolute inset-0 appearance-none focus:outline-none opw" />
            <span class="text-sm font-medium text-gray-900 uppercase group-has-[:checked]:text-white">128 GB</span>
          </label>
        </div>
      </fieldset>
    </div>
  </body>
</html>
