<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@insiders" type="module"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'InterVariable', system-ui, sans-serif;
      --font-sans--font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }
  </style>
</head>
<body class="antialiased bg-white">
  <div class="bg-white">
    <div class="mx-auto max-w-[42rem] px-4 py-16 sm:px-6 sm:py-24 lg:max-w-[80rem] lg:px-8">
      <div class="flex items-center justify-between space-x-4">
        <h2 class="text-lg font-medium text-gray-900">Customers also viewed</h2>
        <a href="#" class="whitespace-nowrap text-sm font-medium text-violet-600 hover:text-violet-500">
          View all
          <span aria-hidden="true"> &rarr;</span>
        </a>
      </div>
      <div class="mt-6 grid grid-cols-1 gap-x-8 gap-y-8 sm:grid-cols-2 sm:gap-y-10 lg:grid-cols-4">
        <!-- Product 1 -->
        <div class="group relative">
          <div class="relative">
            <img
              src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-page-05-related-product-01.jpg"
              alt="Payment application dashboard screenshot"
              class="aspect-[4/3] w-full rounded-lg bg-gray-50 object-cover" />
            <div aria-hidden="true" class="absolute inset-0 flex items-end p-4 opacity-0 group-hover:opacity-100">
              <div class="w-full rounded-sm bg-white/75 px-4 py-2 text-center text-sm font-medium text-gray-900 backdrop-blur-sm">View Product</div>
            </div>
          </div>
          <div class="mt-4 flex items-center justify-between space-x-8 text-base font-medium text-gray-900">
            <h3>
              <a href="#">
                <span aria-hidden="true" class="absolute inset-0"></span>
                Fusion
              </a>
            </h3>
            <p>$49</p>
          </div>
          <p class="mt-1 text-sm text-gray-500">UI Kit</p>
        </div>

        <!-- Product 2 -->
        <div class="group relative">
          <div class="relative">
            <img
              src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-page-05-related-product-02.jpg"
              alt="Calendar user interface screenshot"
              class="aspect-[4/3] w-full rounded-lg bg-gray-50 object-cover" />
            <div aria-hidden="true" class="absolute inset-0 flex items-end p-4 opacity-0 group-hover:opacity-100">
              <div class="w-full rounded-sm bg-white/75 px-4 py-2 text-center text-sm font-medium text-gray-900 backdrop-blur-sm">View Product</div>
            </div>
          </div>
          <div class="mt-4 flex items-center justify-between space-x-8 text-base font-medium text-gray-900">
            <h3>
              <a href="#">
                <span aria-hidden="true" class="absolute inset-0"></span>
                Marketing Icon Pack
              </a>
            </h3>
            <p>$19</p>
          </div>
          <p class="mt-1 text-sm text-gray-500">Icons</p>
        </div>

        <!-- Product 3 -->
        <div class="group relative">
          <div class="relative">
            <img
              src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-page-05-related-product-03.jpg"
              alt="Pricing page screenshot"
              class="aspect-[4/3] w-full rounded-lg bg-gray-50 object-cover" />
            <div aria-hidden="true" class="absolute inset-0 flex items-end p-4 opacity-0 group-hover:opacity-100">
              <div class="w-full rounded-sm bg-white/75 px-4 py-2 text-center text-sm font-medium text-gray-900 backdrop-blur-sm">View Product</div>
            </div>
          </div>
          <div class="mt-4 flex items-center justify-between space-x-8 text-base font-medium text-gray-900">
            <h3>
              <a href="#">
                <span aria-hidden="true" class="absolute inset-0"></span>
                Scaffold
              </a>
            </h3>
            <p>$29</p>
          </div>
          <p class="mt-1 text-sm text-gray-500">Wireframe Kit</p>
        </div>

        <!-- Product 4 -->
        <div class="group relative">
          <div class="relative">
            <img
              src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-page-05-related-product-04.jpg"
              alt="Application screenshot"
              class="aspect-[4/3] w-full rounded-lg bg-gray-50 object-cover" />
            <div aria-hidden="true" class="absolute inset-0 flex items-end p-4 opacity-0 group-hover:opacity-100">
              <div class="w-full rounded-sm bg-white/75 px-4 py-2 text-center text-sm font-medium text-gray-900 backdrop-blur-sm">View Product</div>
            </div>
          </div>
          <div class="mt-4 flex items-center justify-between space-x-8 text-base font-medium text-gray-900">
            <h3>
              <a href="#">
                <span aria-hidden="true" class="absolute inset-0"></span>
                Bones
              </a>
            </h3>
            <p>$29</p>
          </div>
          <p class="mt-1 text-sm text-gray-500">Wireframe Kit</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
